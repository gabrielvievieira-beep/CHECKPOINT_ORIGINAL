    // ── Escala Real (CP_ESCALAS_ROTATIVAS) ───────────────────────────────────

    function carregarEscalasDia(dataStr) {
        // Evita recarregar para a mesma data
        if (escalasDataCarregada === dataStr && escalasDia !== null) {
            atualizarEscalaPanelReal(dataStr);
            return;
        }
        // Indicação visual no rodapé do painel enquanto carrega
        const panel = document.getElementById('escalaPanel');
        if (panel) {
            let nota = panel.querySelector('.flw-escala-nota');
            if (nota) nota.innerHTML += `
                <span style="display:inline-flex;align-items:center;gap:5px;margin-left:10px;color:rgba(139,92,246,.5);font-size:10px;">
                    <span class="flw-prev-loading-dot" style="width:6px;height:6px;"></span> Buscando dados da escala real…
                </span>`;
        }
        google.script.run
            .withSuccessHandler(function(res) {
                escalasDia          = res || { rows: [], schemaCols: [], schemaDetectado: false };
                escalasDataCarregada = dataStr;
                atualizarEscalaPanelReal(dataStr);
            })
            .withFailureHandler(function(err) {
                escalasDia          = { rows: [], schemaCols: [], schemaDetectado: false, erro: String(err) };
                escalasDataCarregada = dataStr;
                // Mantém painel atual baseado em historico — sem atualização
            })
            .getEscalasDia(dataStr);
    }

    // Atualiza o painel "HC Previsto do Dia — por Escala" com dados reais da tabela de escala.
    // Chamado após getEscalasDia() retornar com sucesso (e opcionalmente re-chamado quando
    // ausenciasDia é atualizado por carregarPrevisaoHC).
    function atualizarEscalaPanelReal(dataStr) {
        const panel = document.getElementById('escalaPanel');
        if (!panel) return;

        // Sem dados reais — mantém painel do historico e exibe aviso
        if (!escalasDia || !escalasDia.rows || escalasDia.rows.length === 0) {
            let nota = panel.querySelector('.flw-escala-nota');
            if (nota) {
                nota.querySelectorAll('span').forEach(s => {
                    if (s.textContent.includes('Buscando dados')) s.remove();
                });
                // aviso suprimido — sem dados de escala para a data selecionada
            }
            return;
        }

        // ── 1. Detectar colunas do schema retornado ───────────────────────────
        const rows   = escalasDia.rows;
        const sample = rows[0];
        const turnoKey = ['turno','escala','shift','turno_trabalho','turno_ativo'].find(k => k in sample) || null;

        const turnoCores = {
            'A':'#38bdf8','B':'#fb923c','C':'#a78bfa','D':'#4ade80',
            'MANHA':'#fbbf24','MANHÃ':'#fbbf24','TARDE':'#fb923c','NOITE':'#a78bfa',
            'Manhã':'#fbbf24','Tarde':'#fb923c','Noite':'#a78bfa'
        };

        // ── 2. Agrupar escalados por turno + popular mapa idgroot → turno ────
        const escPorTurno = {};   // turno → contagem
        _idgrootTurnoMap  = {};   // reset para esta data
        rows.forEach(r => {
            const t = (turnoKey ? (r[turnoKey] || 'Sem Turno') : 'Sem Turno');
            escPorTurno[t] = (escPorTurno[t] || 0) + 1;
            if (r.idgroot) _idgrootTurnoMap[String(r.idgroot)] = t;
        });
        const turnosEscAtivos = Object.keys(escPorTurno).sort((a, b) => a.localeCompare(b));

        // ── 3. Aus. Simuladas por turno = escalados × Falta Esperada % ───────
        const ausPorTurno = {};
        turnosEscAtivos.forEach(t => {
            ausPorTurno[t] = Math.round((escPorTurno[t] || 0) * _faltaEsperadaPct / 100);
        });

        // ── 3b. Aus. Reais por turno = ausenciasDia cruzada por idgroot ───────
        const ausRealPorTurno = _computeAusReal();

        // ── 4. Adicionar turnos de folga (do cache do historico, se disponível) ──
        const turnosOffReal = [];
        if (_escalaPanelCache && _escalaPanelCache.porTurnoEsc) {
            Object.entries(_escalaPanelCache.porTurnoEsc).forEach(([t, d]) => {
                if (!d.ativo && !escPorTurno[t]) {
                    // turno estava no historico como folga e não veio na escala real
                    escPorTurno[t]  = 0;
                    turnosOffReal.push(t);
                }
            });
        }

        // ── 5. Montar estrutura unificada para os helpers de render ───────────
        const porTurnoEscFmt = {};
        [...turnosEscAtivos, ...turnosOffReal].forEach(t => {
            const ativo   = !turnosOffReal.includes(t);
            const esc     = escPorTurno[t] || 0;
            const ausProg = ativo ? (ausPorTurno[t] || 0) : 0;
            const ausReal = ativo ? (ausRealPorTurno[t] || 0) : 0;
            porTurnoEscFmt[t] = { ativo, esc, ausProg, ausReal, cor: turnoCores[t] || '#94a3b8' };
        });

        // ── 6. Totais para os KPIs ────────────────────────────────────────────
        const totalEsc     = turnosEscAtivos.reduce((s, t) => s + (escPorTurno[t] || 0), 0);
        const totalAusProg = turnosEscAtivos.reduce((s, t) => s + (ausPorTurno[t] || 0), 0);
        const totalPrevisto = Math.max(0, totalEsc - totalAusProg);
        const nAtivos      = turnosEscAtivos.length;
        const dataFmt      = dataStr.split('-').reverse().join('/');

        // Efetivo Real = presentes confirmados na catraca para este dia
        const realPresentes = registrosPresenca.filter(r => {
            if (normalizarArea(r.area) === '__EXCLUIR__') return false;
            const d = r.data_abs || r.data || r.start_date;
            if (!d) return false;
            const dr = typeof d === 'string' ? d.split('T')[0] : new Date(d).toISOString().split('T')[0];
            return dr === dataStr && isPresente(r.status_presenca);
        }).length;

        // ── 7. Atualizar cache — apenas totalEsc é necessário (aus é sempre calculado)
        _escalaPanelCache = {
            fonte:       'escala_real',
            porTurnoEsc: porTurnoEscFmt,
            totalEsc,
            // totalAusProg não guardado — sempre = totalEsc × _faltaEsperadaPct / 100
        };

        // ── 8. Renderizar no painel ───────────────────────────────────────────
        const body = panel.querySelector('.flw-escala-body');
        if (!body) return;
        const eraCollapsed = panel.classList.contains('collapsed');

        const ausNote = ` · aus. prog. = escalados × ${_faltaEsperadaPct}% (input)`;

        const notaHtml = `
            <div class="flw-escala-nota" id="escalaNota">
                <svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <strong style="color:rgba(52,211,153,.8);">✓ Dados reais de CP_ESCALAS_ROTATIVAS</strong> —
                ${fmt(totalEsc)} escalados em ${nAtivos} turno${nAtivos !== 1 ? 's' : ''} para ${dataFmt}${ausNote}.
                ${turnosOffReal.length > 0 ? `Turnos de folga: <strong>${turnosOffReal.join(', ')}</strong>.` : ''}
            </div>`;

        body.innerHTML = `
            ${_buildEscalaKpiRow(totalEsc, totalAusProg, totalPrevisto, nAtivos, turnosOffReal, realPresentes)}
            <div class="flw-escala-table-wrap">
                <table class="flw-escala-table">
                    <thead><tr>
                        <th>Turno</th>
                        <th>Escalados Hoje</th>
                        <th>Aus. Programadas</th>
                        <th>Previsto</th>
                        <th>Falta Esp.</th>
                        <th>Efetivo Esp.</th>
                        <th>Status</th>
                    </tr></thead>
                    <tbody id="escalaLinhasBody">${_gerarLinhasEscala(porTurnoEscFmt)}</tbody>
                </table>
            </div>
            ${notaHtml}`;

        if (eraCollapsed) panel.classList.add('collapsed');
    }

    // ── Search within detalhes ────────────────────────────────────────────────
    function filtrarDetalhes(termo) {
        const t = (termo || '').toLowerCase().trim();
        let visivel = 0;

        document.querySelectorAll('#detalhesContainer .det-gestor-row').forEach(row => {
            const match = !t || (row.dataset.search || '').includes(t);
            row.style.display = match ? '' : 'none';
            if (match) visivel++;
        });

        document.querySelectorAll('#detalhesContainer .det-setor-group').forEach(grp => {
            const hasVis = [...grp.querySelectorAll('.det-gestor-row')].some(r => r.style.display !== 'none');
            grp.style.display = hasVis ? '' : 'none';
        });

        document.querySelectorAll('#detalhesContainer .det-area-block').forEach(block => {
            const hasVis = [...block.querySelectorAll('.det-gestor-row')].some(r => r.style.display !== 'none');
            block.style.display = hasVis ? '' : 'none';
            if (t) {
                // Com busca ativa: expandir áreas com resultado, recolher as sem
                if (hasVis) block.classList.remove('collapsed');
                else        block.classList.add('collapsed');
            } else {
                // Sem busca: recolher tudo de volta
                block.classList.add('collapsed');
            }
        });

        const cnt = document.getElementById('detalhesSearchCount');
        if (cnt) {
            const tTotal = document.querySelectorAll('#detalhesContainer .det-tab').length || 1;
            cnt.textContent = t ? `${fmt(visivel)} gestor${visivel !== 1 ? 'es' : ''}` : `${fmt(tTotal)} turno${tTotal !== 1 ? 's' : ''}`;
        }
    }

    // ── Helper: colaboradores com ausência programada que saem do HC efetivo ──
    //
    // REGRA:
    //   EXCEÇÕES (excluídos do TOTAL HC, vão para OUTROS, não entram no %ABS):
    //     • Prefixo "AF - "  → Afastado INSS, Licença Maternidade, Ext. Lic. Maternidade
    //     • Prefixo "FE - "  → Férias
    //     • Prefixo "DSR - " → Fora de Escala (Descanso Semanal)
    //     • Exato   "FJ - Atestado" → Atestado médico
    //
    //   DEMAIS JUSTIFICATIVAS (FJ outros, BH, FR, AB, DE, AP, SIE, CE, ON, TR, HCD, HTF...):
    //     → Permanecem no TOTAL HC e refletem normalmente no absenteísmo.
    //     → Se STATUS_PRESENCA = FI, contam como FALTA.
    //
    function _isJustifExcecao(justificativa) {
        const j = (justificativa || '').trim();
        const u = j.toUpperCase();
        return (
            u.startsWith('AF - ')   ||   // INSS / Maternidade / Afastamentos
            u.startsWith('FE - ')   ||   // Férias
            u.startsWith('DSR - ')  ||   // Fora de Escala
            u === 'FJ - ATESTADO'        // Atestado (somente este FJ)
        );
    }

    function _getAfastadosProg() {
        const ids  = new Set(
            ausenciasDia
                .filter(a => _isJustifExcecao(a.justificativa))
                .map(a => String(a.idgroot || '').trim()).filter(Boolean)
        );
        const noms = new Set(
            ausenciasDia
                .filter(a => _isJustifExcecao(a.justificativa))
                .map(a => (a.colaborador || '').trim().toLowerCase()).filter(Boolean)
        );
        return r => {
            const id = String(r.idgroot || r.id_groot || '').trim();
            const n  = (r.colaborador || '').trim().toLowerCase();
            return (id && ids.has(id)) || (n && noms.has(n));
        };
    }

    // ── Absenteísmo Inline (chamado ao selecionar data) ───────────────────────
    function atualizarAbsenteismoInline(dataStr, registros) {
        // Afastados programados (INSS/MATERNIDADE/AFASTAMENTO/ATESTADO) →
        // excluídos do HC efetivo e do índice de ABS; aparecem em "Outros".
        const _isAP    = _getAfastadosProg();
        const cntAP    = registros.filter(r => _isAP(r)).length;
        const efetivos = registros.filter(r => !_isAP(r));

        const total     = efetivos.length;
        const presentes = efetivos.filter(r => isPresente(r.status_presenca)).length;
        const faltas    = efetivos.filter(r => { const s=(r.status_presenca||'').toUpperCase(); return s.includes('FALTA')||s.includes('FALTOU'); }).length;
        const pendente  = efetivos.filter(r => !r.status_presenca || r.status_presenca === '' || r.status_presenca === null).length;
        const outros    = Math.max(0, total - presentes - faltas - pendente) + cntAP;
        const base      = presentes + faltas;
        const pct       = base > 0 ? ((faltas / base) * 100).toFixed(1) : '0.0';
        const pctNum    = parseFloat(pct);
        const cor       = pctNum <= 3 ? '#4ade80' : pctNum <= 6 ? '#fbbf24' : '#f87171';
        const barClass  = pctNum <= 3 ? 'ok' : pctNum <= 6 ? 'warn' : 'bad';

        const el    = document.getElementById('absenteismoPercentual');
        const bar   = document.getElementById('absBarFill');
        const grid  = document.getElementById('absStatusGrid');
        const esc   = document.getElementById('absenteismoEscalas');
        const card  = document.getElementById('absenteismoCard');

        if (!el) return;

        // Se não há registros (nem afastados), esconde o card com mensagem
        if (registros.length === 0) {
            if (grid) grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:8px 0;font-size:12px;color:rgba(148,163,184,.45);">Sem registros para ${dataStr || 'essa data'}</div>`;
            if (card) card.classList.add('show');
            el.textContent = '—';
            el.style.color = 'rgba(148,163,184,.5)';
            return;
        }

        el.textContent = `${pct}%`;
        el.style.color  = cor;

        if (bar) {
            bar.className = `abs-bar-fill ${barClass}`;
            setTimeout(() => { bar.style.width = `${Math.min(pctNum * 3, 100)}%`; }, 50);
        }

        if (grid) {
            grid.innerHTML = `
                <div class="abs-status-chip pres">
                    <div class="abs-chip-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                    <div class="abs-chip-body"><div class="abs-chip-val">${presentes.toLocaleString('pt-BR')}</div><div class="abs-chip-lbl">Presentes</div></div>
                </div>
                <div class="abs-status-chip falt">
                    <div class="abs-chip-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
                    <div class="abs-chip-body"><div class="abs-chip-val">${faltas.toLocaleString('pt-BR')}</div><div class="abs-chip-lbl">Faltas</div></div>
                </div>
                <div class="abs-status-chip fold">
                    <div class="abs-chip-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="10"/></svg></div>
                    <div class="abs-chip-body"><div class="abs-chip-val">${outros.toLocaleString('pt-BR')}</div><div class="abs-chip-lbl">Outros</div></div>
                </div>
                <div class="abs-status-chip pend">
                    <div class="abs-chip-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                    <div class="abs-chip-body"><div class="abs-chip-val">${pendente.toLocaleString('pt-BR')}</div><div class="abs-chip-lbl">Pendente</div></div>
                </div>`;
        }
        // Total HC footer
        const elFooter  = document.getElementById('absTotalFooter');
        const elTotalVal = document.getElementById('absTotalVal');
        const elPctBadge = document.getElementById('absPctNum');
        const elBarMeta  = document.getElementById('absBarMeta');
        if (elFooter)   { elFooter.style.display = registros.length > 0 ? '' : 'none'; }
        if (elTotalVal) { elTotalVal.textContent = total.toLocaleString('pt-BR'); }
        if (elPctBadge) { elPctBadge.textContent = `${pct}%`; elPctBadge.style.color = cor; }
        if (elBarMeta)  { elBarMeta.textContent = `${faltas}/${base}`; }

        if (esc) esc.innerHTML = '';
        if (card) card.classList.add('show');
    }

    // ── Absenteísmo ───────────────────────────────────────────────────────────
    // Flag: true = card aberto no modo "geral" (botão Ver Absenteísmo do Dia)
    let _absGeralAberto = false;

    function atualizarCardAbsenteismo(dataStr) {
        const absenteismoCard = document.getElementById('absenteismoCard');
        if (!absenteismoCard.classList.contains('show')) return; // card fechado — não faz nada

        if (areaCardSelecionada && turnoCardSelecionado) {
            // Modo área-específico: atualiza com a área/turno selecionados
            atualizarCardAbsenteismoPorArea(dataStr, areaCardSelecionada, turnoCardSelecionado);
        } else if (_absGeralAberto) {
            // Modo geral: recalcula para o novo dia/filtro em vez de esconder
            calcularAbsenteismoGeralDia(dataStr);
        } else {
            absenteismoCard.classList.remove('show');
        }
    }

    function atualizarCardAbsenteismoPorArea(dataStr, areaNome, turnoNome) {
        areaCardSelecionada  = areaNome;
        turnoCardSelecionado = turnoNome;

        let registrosDia = registrosPresenca.filter(r => {
            const data = r.data_abs || r.data || r.start_date;
            if (!data) return false;
            const dr = typeof data === 'string' ? data.split('T')[0]
                                                : new Date(data).toISOString().split('T')[0];
            return dr === dataStr;
        });

        registrosDia = registrosDia.filter(r => {
            const area  = normalizarArea(r.area) || 'Sem Área';
            const turno = r.turno || 'Sem Turno';
            return area === areaNome && turno === turnoNome;
        });

        if (escalasSelecionadas.size > 0)
            registrosDia = registrosDia.filter(r => escalasSelecionadas.has(r.escala || 'Sem Escala'));

        // Afastados programados (INSS/MATERNIDADE/AFASTAMENTO/ATESTADO) →
        // excluídos do HC efetivo; aparecem em "Outros"
        const _isAPArea    = _getAfastadosProg();
        const cntAPArea    = registrosDia.filter(r => _isAPArea(r)).length;
        const efetivosArea = registrosDia.filter(r => !_isAPArea(r));

        const presentes = efetivosArea.filter(r => isPresente(r.status_presenca)).length;
        const faltas    = efetivosArea.filter(r => {
            const s = (r.status_presenca || '').toUpperCase();
            return s.includes('FALTA') || s.includes('FALTOU');
        }).length;
        const base = presentes + faltas;
        const pct  = base > 0 ? ((faltas / base) * 100).toFixed(1) : '0.0';
        const cor  = parseFloat(pct) <= 5 ? '#4ade80' : '#f87171';

        const porStatus = {};
        registrosDia.forEach(r => {
            const s = r.status_presenca || r.status || 'N/A';
            porStatus[s] = (porStatus[s] || 0) + 1;
        });

        const pctNum2   = parseFloat(pct);
        const cor2      = pctNum2 <= 3 ? '#4ade80' : pctNum2 <= 6 ? '#fbbf24' : '#f87171';
        const barClass2 = pctNum2 <= 3 ? 'ok' : pctNum2 <= 6 ? 'warn' : 'bad';

        const elPct  = document.getElementById('absenteismoPercentual');
        const bar    = document.getElementById('absBarFill');
        const grid   = document.getElementById('absStatusGrid');
        const esc    = document.getElementById('absenteismoEscalas');
        const card   = document.getElementById('absenteismoCard');

        if (!elPct) return;
        elPct.textContent = `${pct}%`;
        elPct.style.color = cor2;

        if (bar) {
            bar.className = `abs-bar-fill ${barClass2}`;
            setTimeout(() => { bar.style.width = `${Math.min(pctNum2 * 3, 100)}%`; }, 50);
        }

        const pending2 = efetivosArea.filter(r => !r.status_presenca || r.status_presenca === '').length;
        const outros2  = Math.max(0, efetivosArea.length - presentes - faltas - pending2) + cntAPArea;
        if (grid) {
            grid.innerHTML = `
                <div class="abs-status-chip pres">
                    <div class="abs-chip-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                    <div class="abs-chip-body"><div class="abs-chip-val">${fmt(presentes)}</div><div class="abs-chip-lbl">Presentes</div></div>
                </div>
                <div class="abs-status-chip falt">
                    <div class="abs-chip-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
                    <div class="abs-chip-body"><div class="abs-chip-val">${fmt(faltas)}</div><div class="abs-chip-lbl">Faltas</div></div>
                </div>
                <div class="abs-status-chip fold">
                    <div class="abs-chip-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="10"/></svg></div>
                    <div class="abs-chip-body"><div class="abs-chip-val">${fmt(outros2 > 0 ? outros2 : 0)}</div><div class="abs-chip-lbl">Outros</div></div>
                </div>
                <div class="abs-status-chip pend">
                    <div class="abs-chip-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                    <div class="abs-chip-body"><div class="abs-chip-val">${fmt(pending2)}</div><div class="abs-chip-lbl">Pendente</div></div>
                </div>`;
        }
        // Atualizar Total HC footer e badge no modo área
        const footer2  = document.getElementById('absTotalFooter');
        const totalVal2 = document.getElementById('absTotalVal');
        const pctNum2b  = document.getElementById('absPctNum');
        const barMeta2  = document.getElementById('absBarMeta');
        const total2    = efetivosArea.length; // HC efetivo (excluindo afastados programados)
        if (footer2)   { footer2.style.display = registrosDia.length > 0 ? '' : 'none'; }
        if (totalVal2) { totalVal2.textContent = fmt(total2); }
        if (pctNum2b)  { pctNum2b.textContent = `${pct}%`; pctNum2b.style.color = cor2; }
        if (barMeta2)  { barMeta2.textContent = `${faltas}/${base}`; }

        if (esc) {
            esc.innerHTML = Object.keys(porStatus).length === 0
                ? '<div style="text-align:center;color:rgba(255,255,255,.3);padding:10px 0;font-size:12px;">Nenhum detalhe disponível</div>'
                : `<div style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:6px;">Detalhes por Status · ${areaNome}</div>` +
                  Object.entries(porStatus).sort((a,b) => b[1]-a[1]).map(([s,c]) => `
                    <div class="absenteismo-status-item">
                        <span class="absenteismo-status-nome">${s}</span>
                        <span class="absenteismo-status-count">${fmt(c)}</span>
                    </div>`).join('');
        }
        if (card) card.classList.add('show');
    }

    function calcularAbsenteismoGeralDia(dataStr) {
        const registrosDia = registrosPresenca.filter(r => {
            const data = r.data_abs || r.data || r.start_date;
            if (!data) return false;
            const dr = typeof data === 'string' ? data.split('T')[0]
                                                : new Date(data).toISOString().split('T')[0];
            return dr === dataStr;
        });
        // Mostra o card sempre — mesmo sem registros exibe zeros
        atualizarAbsenteismoInline(dataStr, registrosDia);
        // Garante que o botão reflita o estado aberto
        const btn = document.getElementById('btnAbsenteismoGeral');
        if (btn) btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Fechar';
    }

// ══════════════════════════════════════════════════════════════════
// FOLGA DO DIA — Calendário Escala 6x2
// ══════════════════════════════════════════════════════════════════

const FOLGA_REF        = new Date(2026, 0, 3); // 03 Jan 2026 = Turma A, dia 1
const FOLGA_CYCLE      = ['A','A','B','B','C','C','D','D'];

const FOLGA_CORES = {
  A: { bg:'rgba(248,113,113,.18)', border:'rgba(248,113,113,.4)',  text:'#f87171',  glow:'rgba(248,113,113,.3)' },
  B: { bg:'rgba(251,191,36,.18)',  border:'rgba(251,191,36,.4)',   text:'#fbbf24',  glow:'rgba(251,191,36,.3)'  },
  C: { bg:'rgba(34,211,238,.18)',  border:'rgba(34,211,238,.4)',   text:'#22d3ee',  glow:'rgba(34,211,238,.3)'  },
  D: { bg:'rgba(129,140,248,.18)', border:'rgba(129,140,248,.4)',  text:'#818cf8',  glow:'rgba(129,140,248,.3)' },
};

const FOLGA_MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                     'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const FOLGA_DIAS  = ['D','S','T','Q','Q','S','S'];

function folgaDoDate(date) {
  const d0  = new Date(FOLGA_REF); d0.setHours(0,0,0,0);
  const d1  = new Date(date);      d1.setHours(0,0,0,0);
  const diff = Math.round((d1 - d0) / 86400000);
  return FOLGA_CYCLE[((diff % 8) + 8) % 8];
}

function abrirCalendarioFolga() {
  const modal = document.getElementById('folgaModalBg');
  if (!modal) return;

  const hoje   = new Date(); hoje.setHours(0,0,0,0);
  const turmaH = folgaDoDate(hoje);
  const cH     = FOLGA_CORES[turmaH];

  // Banner "hoje"
  const banner = document.getElementById('folgaHojeBanner');
  if (banner) {
    banner.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span style="font-size:12px;color:rgba(255,255,255,.3);font-weight:600;">Hoje —
        ${hoje.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}
      </span>
      <div style="margin-left:8px;display:flex;align-items:center;gap:8px;
        padding:5px 14px;border-radius:20px;
        background:${cH.bg};border:1px solid ${cH.border};
        box-shadow:0 0 16px ${cH.glow};">
        <div style="width:8px;height:8px;border-radius:50%;background:${cH.text};box-shadow:0 0 8px ${cH.text};"></div>
        <span style="font-size:13px;font-weight:900;color:${cH.text};letter-spacing:.04em;">TURMA ${turmaH} DE FOLGA</span>
      </div>
    `;
  }

  // Grid de meses
  const grid = document.getElementById('folgaCalGrid');
  if (!grid) return;

  let html = '';
  for (let m = 0; m < 12; m++) {
    const firstDay = new Date(2026, m, 1);
    const lastDay  = new Date(2026, m+1, 0).getDate();
    const startDow = firstDay.getDay();

    html += `
      <div style="background:rgba(8,14,30,.98);padding:16px 14px 14px;">
        <div style="font-size:13px;font-weight:800;color:#fff;text-align:center;
          margin-bottom:10px;letter-spacing:-.2px;">${FOLGA_MESES[m]}</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">
    `;

    FOLGA_DIAS.forEach((d,i) => {
      const cor = (i===0||i===6) ? 'rgba(255,255,255,.2)' : 'rgba(255,255,255,.18)';
      html += `<div style="text-align:center;font-size:9px;font-weight:700;color:${cor};
        padding:3px 0;letter-spacing:.04em;">${d}</div>`;
    });

    for (let e = 0; e < startDow; e++) {
      html += `<div></div>`;
    }

    for (let d = 1; d <= lastDay; d++) {
      const date   = new Date(2026, m, d);
      const turma  = folgaDoDate(date);
      const cor    = FOLGA_CORES[turma];
      const isHoje = date.getTime() === hoje.getTime();
      const dow    = date.getDay();
      const isFDS  = dow === 0 || dow === 6;

      const extraStyle = isHoje
        ? `box-shadow:0 0 0 2px ${cor.text},0 0 12px ${cor.glow};font-weight:900;`
        : '';

      html += `
        <div style="
          position:relative;
          text-align:center;
          padding:4px 2px;
          border-radius:6px;
          background:${cor.bg};
          border:1px solid ${isHoje ? cor.text : cor.border};
          font-size:${isHoje ? '10px' : '9.5px'};
          font-weight:${isHoje ? '900' : '700'};
          color:${cor.text};
          cursor:default;
          ${extraStyle}
          ${isFDS ? 'opacity:.85;' : ''}
        " title="Turma ${turma} de folga">
          ${d}
          <div style="font-size:7px;font-weight:900;color:${cor.text};opacity:.9;line-height:1;">${turma}</div>
          ${isHoje ? `<div style="position:absolute;top:-3px;right:-3px;width:6px;height:6px;border-radius:50%;background:${cor.text};box-shadow:0 0 6px ${cor.text};"></div>` : ''}
        </div>`;
    }

    html += `</div></div>`;
  }

  grid.innerHTML = html;
  modal.style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function fecharFolgaModal(e) {
  if (e && e.target !== document.getElementById('folgaModalBg')) return;
  const modal = document.getElementById('folgaModalBg');
  if (modal) modal.style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('folgaModalBg');
    if (modal && modal.style.display !== 'none') {
      modal.style.display = 'none';
      document.body.style.overflow = '';
    }
  }
});
</script>
