    // ── Detalhes do Dia ───────────────────────────────────────────────────────

    function renderDetalhes(dataStr) {
        let presentesDia = registrosPresenca.filter(r => {
            const data = r.data_abs || r.data || r.start_date;
            if (!data) return false;
            const dr = typeof data === 'string' ? data.split('T')[0]
                                                : new Date(data).toISOString().split('T')[0];
            return dr === dataStr;
        });

        if (areasSelecionadas.size > 0)
            presentesDia = presentesDia.filter(r => areasSelecionadas.has(normalizarArea(r.area)));
        if (turnosSelecionados.size > 0)
            presentesDia = presentesDia.filter(r => turnosSelecionados.has(r.turno || 'Sem Turno'));
        if (escalasSelecionadas.size > 0)
            presentesDia = presentesDia.filter(r => escalasSelecionadas.has(r.escala || 'Sem Escala'));

        // Afastados programados (INSS/MATERNIDADE/AFASTAMENTO/ATESTADO) →
        // excluídos do HC efetivo e do índice de ABS; contabilizados em "Outros".
        const _isAusProg  = _getAfastadosProg();
        const cntAusProg  = presentesDia.filter(r => _isAusProg(r)).length;
        const efetivos    = presentesDia.filter(r => !_isAusProg(r));

        const totalHC     = efetivos.length;
        const cntPresente = efetivos.filter(r => _isEfetivamentePresente(r)).length;
        const cntFalta    = efetivos.filter(r => { const s=(r.status_presenca||'').toUpperCase(); return s.includes('FALTA')||s.includes('FALTOU'); }).length;
        const cntOutros   = efetivos.filter(r => { const s=(r.status_presenca||'').toUpperCase(); return !isPresente(r.status_presenca) && !s.includes('FALTA') && !s.includes('FALTOU') && s && s!==''; }).length + cntAusProg;
        const cntPendente = efetivos.filter(r => _isPendente(r)).length;
        const base        = cntPresente + cntFalta;
        const pctAbs      = base > 0 ? ((cntFalta / base) * 100).toFixed(1) : '0.0';

        atualizarAbsenteismoInline(dataStr, presentesDia);

        if (presentesDia.length === 0) {
            detalhesContainer.innerHTML = `
                <div class="detalhes-header">
                    <h3 class="detalhes-titulo">Registros do Dia</h3>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <button class="btn-mapa-dark" onclick="navegar('historico')">
                            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            Mapa de Presença
                            <span class="bmd-arrow">›</span>
                        </button>
                        <button class="btn-mapa-dark btn-heatmap" onclick="navegarHeatmap()">
                            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                            Heatmap de Presença
                            <span class="bmd-arrow">›</span>
                        </button>
                        <span class="detalhes-data">${formatarData(dataStr)}</span>
                    </div>
                </div>
                <div class="empty-state">
                    <div class="es-icon-wrap">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="15" x2="9.01" y2="15" stroke-width="2.5"/><line x1="12" y1="15" x2="12.01" y2="15" stroke-width="2.5"/><line x1="15" y1="15" x2="15.01" y2="15" stroke-width="2.5"/></svg>
                    </div>
                    <div class="es-title">Nenhum registro para esta data</div>
                    <div class="es-sub">A chamada ainda não foi lançada ou não há colaboradores escalados. Selecione outro dia no calendário.</div>
                    <div class="es-action" onclick="document.getElementById('calendario')?.scrollIntoView({behavior:'smooth'})">
                        <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        Selecionar outra data
                    </div>
                </div>`;
            return;
        }

        // ── Agrupar: Turno → Área → Setor → Gestor (com _rows em cada nível) ──
        const porTurno = {};
        presentesDia.forEach(r => {
            // Mesma lógica do chamada.html — exclui registros cujo gestor tem cargo gerencial
            if (cargoGestorExcluidoFlw(r.cargo_gestor)) return;
            const area   = normalizarArea(r.area);
            if (area === '__EXCLUIR__') return; // área inválida (ex: CIE)
            const turno  = r.turno  || 'Sem Turno';
            const setor  = normalizarSetor(r.setor) || 'Sem Setor';
            const gestor = r.gestor || 'Sem Gestor';
            if (!porTurno[turno]) porTurno[turno] = { _rows: [], areas: {} };
            porTurno[turno]._rows.push(r);
            if (!porTurno[turno].areas[area]) porTurno[turno].areas[area] = { _rows: [], setores: {} };
            porTurno[turno].areas[area]._rows.push(r);
            if (!porTurno[turno].areas[area].setores[setor]) porTurno[turno].areas[area].setores[setor] = {};
            if (!porTurno[turno].areas[area].setores[setor][gestor]) porTurno[turno].areas[area].setores[setor][gestor] = [];
            porTurno[turno].areas[area].setores[setor][gestor].push(r);
        });

        const turnoKeys = Object.keys(porTurno).sort((a, b) => a.localeCompare(b));

        // Reset turno/área se não estão mais disponíveis
        if (_detalhesTurnoAtivo && !turnoKeys.includes(_detalhesTurnoAtivo)) {
            _detalhesTurnoAtivo = null;
            _detalhesAreaAtiva  = null;
        }
        if (_detalhesAreaAtiva && _detalhesTurnoAtivo) {
            const areaKeys = Object.keys(porTurno[_detalhesTurnoAtivo]?.areas || {});
            if (!areaKeys.includes(_detalhesAreaAtiva)) _detalhesAreaAtiva = null;
        }

        // ── Helpers ────────────────────────────────────────────────────────────
        function statusPills(rows) {
            const p = rows.filter(r => _isEfetivamentePresente(r)).length;
            const f = rows.filter(r => { const s=(r.status_presenca||'').toUpperCase(); return s.includes('FALTA')||s.includes('FALTOU'); }).length;
            const o = rows.filter(r => { const s=(r.status_presenca||'').toUpperCase(); return !isPresente(r.status_presenca) && !s.includes('FALTA') && !s.includes('FALTOU') && s && s!==''; }).length;
            const n = rows.filter(r => _isPendente(r)).length;
            // Chips com valor + label descritivo — legível sem precisar de legenda
            let html = '<div class="det-g-stats">';
            if (p > 0) html += `<div class="det-g-stat det-g-stat-p"><span class="det-g-stat-val">${fmt(p)}</span><span class="det-g-stat-lbl">Pres.</span></div>`;
            if (n > 0) html += `<div class="det-g-stat det-g-stat-n"><span class="det-g-stat-val">${fmt(n)}</span><span class="det-g-stat-lbl">Pend.</span></div>`;
            if (f > 0) html += `<div class="det-g-stat det-g-stat-f"><span class="det-g-stat-val">${fmt(f)}</span><span class="det-g-stat-lbl">Falta</span></div>`;
            if (o > 0) html += `<div class="det-g-stat det-g-stat-o"><span class="det-g-stat-val">${fmt(o)}</span><span class="det-g-stat-lbl">Outros</span></div>`;
            html += '</div>';
            return html;
        }

        function gestorInitials(nome) {
            const parts = nome.trim().split(/\s+/).filter(w => w.length > 1);
            if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
            return nome.slice(0, 2).toUpperCase();
        }

        // ── KPI Row (sempre visível) ──────────────────────────────────────────
        const pctPres = totalHC > 0 ? Math.round((cntPresente / totalHC) * 100) : 0;
        const kpiHtml = `
            <div class="detalhes-header">
                <h3 class="detalhes-titulo">Registros do Dia</h3>
                <div style="display:flex;align-items:center;gap:8px;">
                    <button class="btn-mapa-dark" onclick="navegar('historico')">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        Mapa de Presença
                    </button>
                    <button class="btn-mapa-dark btn-heatmap" onclick="navegar('historico')">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        Heatmap de Presença
                    </button>
                    <span class="detalhes-data">${formatarData(dataStr)} · <strong style="color:#FFD700">${fmt(totalHC)}</strong></span>
                </div>
            </div>
            <div class="flw-day-kpi-row">
                <div class="flw-day-kpi total">
                    <div class="flw-day-kpi-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
                    <div class="flw-day-kpi-val">${fmt(totalHC)}</div>
                    <div class="flw-day-kpi-lbl">Total HC</div>
                    <div class="flw-day-kpi-sub">${fmt(turnoKeys.length)} turno${turnoKeys.length !== 1 ? 's' : ''}</div>
                </div>
                <div class="flw-day-kpi pres">
                    <div class="flw-day-kpi-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
                    <div class="flw-day-kpi-val">${fmt(cntPresente)}</div>
                    <div class="flw-day-kpi-lbl">Presentes</div>
                    <div class="flw-day-kpi-sub">${pctPres}% do total</div>
                </div>
                <div class="flw-day-kpi falt">
                    <div class="flw-day-kpi-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
                    <div class="flw-day-kpi-val">${fmt(cntFalta)}</div>
                    <div class="flw-day-kpi-lbl">Faltas</div>
                    <div class="flw-day-kpi-sub">${pctAbs}% abs.</div>
                </div>
                <div class="flw-day-kpi outr">
                    <div class="flw-day-kpi-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                    <div class="flw-day-kpi-val">${fmt(cntOutros)}</div>
                    <div class="flw-day-kpi-lbl">Outros</div>
                    <div class="flw-day-kpi-sub">divergências</div>
                </div>
                <div class="flw-day-kpi pend">
                    <div class="flw-day-kpi-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                    <div class="flw-day-kpi-val">${pctAbs}%</div>
                    <div class="flw-day-kpi-lbl">% Abs.</div>
                    <div class="flw-day-kpi-sub">${fmt(cntPendente)} pendentes</div>
                </div>
            </div>`;

        // ── Helper: avatares de gestores ──────────────────────────────────────
        function buildGestorAvatars(rows) {
            const gestMap = new Map();
            rows.forEach(r => { if (r.gestor) gestMap.set(r.gestor, true); });
            const gestList = [...gestMap.keys()];
            const visible  = gestList.slice(0, 5).map(nome => {
                const parts = nome.trim().split(/\s+/).filter(w => w.length > 1);
                const ini   = parts.length >= 2
                    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
                    : nome.slice(0, 2).toUpperCase();
                return `<span class="flw-tc-gest-av" title="${nome}">${ini}</span>`;
            }).join('');
            const extra = gestList.length > 5
                ? `<span class="flw-tc-gest-av flw-tc-gest-more">+${gestList.length - 5}</span>`
                : '';
            return `<div class="flw-tc-gest-row">${visible}${extra}</div>`;
        }

        // ── Helper: turno card HTML ────────────────────────────────────────────
        function buildTurnoCard(turno, rows, onclick) {
            const cnt     = rows.length;
            const pres    = rows.filter(r => _isEfetivamentePresente(r)).length;
            const pend    = rows.filter(r => _isPendente(r)).length;
            const nGest   = new Set(rows.map(r => r.gestor).filter(Boolean)).size;
            const tabPct  = cnt > 0 ? Math.round((pres / cnt) * 100) : 0;
            const concPct = cnt > 0 ? Math.round(((cnt - pend) / cnt) * 100) : 100;
            // Breakdown por área
            const areaMap = {};
            rows.forEach(r => {
                const a = normalizarArea(r.area);
                if (!areaMap[a]) areaMap[a] = { total: 0, pres: 0 };
                areaMap[a].total++;
                if (isPresente(r.status_presenca)) areaMap[a].pres++;
            });
            const areaPills = Object.entries(areaMap)
                .sort((a, b) => a[0].localeCompare(b[0]))
                .map(([a, d]) => `<span class="flw-tc-area-pill">${a} <strong>${fmt(d.pres)}/${fmt(d.total)}</strong></span>`)
                .join('');
            const pendHtml = pend > 0
                ? `<div class="flw-tc-pend"><span class="flw-tc-dot"></span>${fmt(pend)} pendentes · ${concPct}% concluído</div>`
                : `<div class="flw-tc-pend flw-tc-pend-ok"><span class="flw-tc-dot flw-tc-dot-ok"></span>Tudo registrado ✓</div>`;
            return `
            <div class="flw-turno-card" onclick="${onclick}">
                <div class="flw-tc-top">
                    <span class="flw-tc-badge">${turno}</span>
                    <div class="flw-tc-pres-badge">${fmt(pres)}<span>/${fmt(cnt)}</span></div>
                    <svg class="flw-tc-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
                ${buildGestorAvatars(rows)}
                <div class="flw-tc-meta">${fmt(nGest)} gestor${nGest !== 1 ? 'es' : ''} · ${fmt(cnt)} colaboradores</div>
                <div class="flw-tc-bar-wrap"><div class="flw-tc-bar" style="width:${tabPct}%"></div></div>
                <div class="flw-tc-area-row">${areaPills}</div>
                ${pendHtml}
            </div>`;
        }

        // ── Helper: área card HTML ────────────────────────────────────────────
        function buildAreaCard(area, rows, onclick) {
            const cnt     = rows.length;
            const pres    = rows.filter(r => _isEfetivamentePresente(r)).length;
            const pend    = rows.filter(r => _isPendente(r)).length;
            const nGest   = new Set(rows.map(r => r.gestor).filter(Boolean)).size;
            const tabPct  = cnt > 0 ? Math.round((pres / cnt) * 100) : 0;
            const concPct = cnt > 0 ? Math.round(((cnt - pend) / cnt) * 100) : 100;
            // Breakdown por setor (processo)
            const setorMap = {};
            rows.forEach(r => {
                const s = normalizarSetor(r.setor) || 'Sem Setor';
                if (!setorMap[s]) setorMap[s] = { total: 0, pres: 0 };
                setorMap[s].total++;
                if (isPresente(r.status_presenca)) setorMap[s].pres++;
            });
            const setorPills = Object.entries(setorMap)
                .sort((a, b) => b[1].total - a[1].total)
                .map(([s, d]) => `<span class="flw-tc-setor-pill">${s} <strong>${fmt(d.pres)}/${fmt(d.total)}</strong></span>`)
                .join('');
            const pendHtml = pend > 0
                ? `<div class="flw-tc-pend"><span class="flw-tc-dot"></span>${fmt(pend)} pendentes · ${concPct}% concluído</div>`
                : `<div class="flw-tc-pend flw-tc-pend-ok"><span class="flw-tc-dot flw-tc-dot-ok"></span>Tudo registrado ✓</div>`;
            return `
            <div class="flw-turno-card" onclick="${onclick}">
                <div class="flw-tc-top">
                    <span class="flw-tc-badge" style="font-size:1.4rem;letter-spacing:-.01em">${area}</span>
                    <div class="flw-tc-pres-badge">${fmt(pres)}<span>/${fmt(cnt)}</span></div>
                    <svg class="flw-tc-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
                ${buildGestorAvatars(rows)}
                <div class="flw-tc-meta">${fmt(nGest)} gestor${nGest !== 1 ? 'es' : ''} · ${fmt(cnt)} colaboradores</div>
                <div class="flw-tc-bar-wrap"><div class="flw-tc-bar" style="width:${tabPct}%"></div></div>
                <div class="flw-tc-area-row">${setorPills}</div>
                ${pendHtml}
            </div>`;
        }

        // ════════════════════════════════════════════════════════════════════
        // NÍVEL 1 — Seleção de Turno
        // ════════════════════════════════════════════════════════════════════
        if (_detalhesTurnoAtivo === null) {
            let html = kpiHtml;

            // ── Painel de Resumo HC × Turno × Área ────────────────────────
            const allAreasSet = new Set();
            turnoKeys.forEach(t => Object.keys(porTurno[t].areas).forEach(a => allAreasSet.add(a)));
            const sortedAllAreas = [...allAreasSet].sort((a, b) => a.localeCompare(b));

            // Pré-computar totais por área (para o cabeçalho e rodapé)
            const areaTotaisGeral = {};
            sortedAllAreas.forEach(a => { areaTotaisGeral[a] = { total: 0, pres: 0 }; });
            let grandTotal = 0, grandPres = 0, grandPend = 0;

            // Mapeamento de turno → cor de acento
            const turnoCores = { T1:'#818cf8', T2:'#38bdf8', T3:'#34d399', T4:'#fbbf24', ADM:'#FFD700' };
            const turnoDataAttr = (t) => {
                if (t === 'Sem Turno') return 'SEM';
                return t.replace(/\s+/g,'').toUpperCase().slice(0,3);
            };


            // Timestamp de atualização
            const agora = new Date();
            const ts = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0');

            let summaryRows = '';
            let piorTurno = null, piorPct = 101;

            turnoKeys.forEach(turno => {
                const tRows  = porTurno[turno]._rows;
                const tTotal = tRows.length;
                const tPres  = tRows.filter(r => isPresente(r.status_presenca)).length;
                const tFalt  = tRows.filter(r => { const s=(r.status_presenca||'').toUpperCase(); return s.includes('FALTA')||s.includes('FALTOU'); }).length;
                const tPend  = tRows.filter(r => !r.status_presenca || r.status_presenca === '').length;
                const tPct   = tTotal > 0 ? Math.round((tPres / tTotal) * 100) : 0;
                const tCls   = tPct >= 85 ? 'rt-ok' : tPct >= 60 ? 'rt-warn' : 'rt-bad';
                const tColor = turnoCores[turno] || 'rgba(148,163,184,.6)';
                grandTotal += tTotal; grandPres += tPres; grandPend += tPend;

                // Detectar turno mais crítico
                if (tTotal > 0 && tPct < piorPct) { piorPct = tPct; piorTurno = turno; }

                summaryRows += `<tr data-turno="${turnoDataAttr(turno)}">
                    <td class="flw-rt-turno">
                        <div class="flw-rt-turno-inner">
                            <div>
                                <div class="flw-rt-turno-label">${turno}</div>
                                <div class="flw-rt-turno-sub">${fmt(tTotal)} colab.</div>
                            </div>
                        </div>
                    </td>`;

                sortedAllAreas.forEach(area => {
                    const ad = porTurno[turno].areas[area];
                    if (ad) {
                        const aT   = ad._rows.length;
                        const aP   = ad._rows.filter(r => isPresente(r.status_presenca)).length;
                        const aPct = aT > 0 ? Math.round((aP / aT) * 100) : 0;
                        const cls  = aPct >= 85 ? 'rt-ok' : aPct >= 60 ? 'rt-warn' : 'rt-bad';
                        areaTotaisGeral[area].total += aT;
                        areaTotaisGeral[area].pres  += aP;
                        summaryRows += `<td class="flw-rt-cell ${cls}">
                            <div class="flw-rt-cell-inner">
                                <strong>${aP}</strong>
                                <div class="flw-rt-cell-meta">de ${aT}</div>
                                <div class="flw-rt-cell-pct">${aPct}%</div>
                                <div class="flw-rt-mini-bar"><div class="flw-rt-mini-fill" style="width:${aPct}%"></div></div>
                            </div>
                        </td>`;
                    } else {
                        summaryRows += `<td class="flw-rt-cell rt-empty">—</td>`;
                    }
                });

                // Coluna Pendentes
                const pendCls = tPend === 0 ? 'pend-zero' : '';
                summaryRows += `<td class="flw-rt-pend-cell ${pendCls}">
                    <strong>${tPend === 0 ? '✓' : fmt(tPend)}</strong>
                    <div class="flw-rt-cell-meta">${tPend === 0 ? 'zerado' : 'aguardando'}</div>
                    ${tFalt > 0 ? `<div style="font-size:9px;color:rgba(148,163,184,.45);margin-top:2px;font-weight:700;">${fmt(tFalt)} falta${tFalt!==1?'s':''}</div>` : ''}
                </td>`;

                summaryRows += `<td class="flw-rt-total">
                    <strong>${fmt(tPres)}</strong>
                    <div class="flw-rt-total-meta">de ${fmt(tTotal)}</div>
                    <div class="flw-rt-total-pct ${tCls}" style="color:rgba(148,163,184,.6);background:rgba(255,255,255,.06)">${tPct}%</div>
                    <div class="flw-rt-mini-bar-gold"><div class="flw-rt-mini-fill-gold" style="width:${tPct}%"></div></div>
                </td></tr>`;
            });

            // Rodapé — totais por área
            const gPct  = grandTotal > 0 ? Math.round((grandPres / grandTotal) * 100) : 0;
            const gCls  = gPct >= 85 ? 'rt-ok' : gPct >= 60 ? 'rt-warn' : 'rt-bad';
            let footerRow = `<tr class="flw-rt-footer" data-turno="TOTAL">
                <td class="flw-rt-turno">
                    <div class="flw-rt-turno-inner">
                        <div>
                            <div class="flw-rt-turno-label">TOTAL GERAL</div>
                            <div class="flw-rt-turno-sub">${fmt(grandTotal)} colab.</div>
                        </div>
                    </div>
                </td>`;
            sortedAllAreas.forEach(area => {
                const d   = areaTotaisGeral[area];
                const pct = d.total > 0 ? Math.round((d.pres / d.total) * 100) : 0;
                const cls = pct >= 85 ? 'rt-ok' : pct >= 60 ? 'rt-warn' : 'rt-bad';
                footerRow += `<td class="flw-rt-cell ${cls}">
                    <div class="flw-rt-cell-inner">
                        <strong>${fmt(d.pres)}</strong>
                        <div class="flw-rt-cell-meta">de ${fmt(d.total)}</div>
                        <div class="flw-rt-cell-pct">${pct}%</div>
                        <div class="flw-rt-mini-bar"><div class="flw-rt-mini-fill" style="width:${pct}%"></div></div>
                    </div>
                </td>`;
            });
            footerRow += `<td class="flw-rt-pend-cell ${grandPend===0?'pend-zero':''}">
                <strong>${grandPend === 0 ? '✓' : fmt(grandPend)}</strong>
                <div class="flw-rt-cell-meta">${grandPend === 0 ? 'zerado' : 'aguardando'}</div>
            </td>
            <td class="flw-rt-total">
                <strong>${fmt(grandPres)}</strong>
                <div class="flw-rt-total-meta">de ${fmt(grandTotal)}</div>
                <div class="flw-rt-total-pct ${gCls}" style="color:rgba(148,163,184,.6);background:rgba(255,255,255,.06)">${gPct}%</div>
                <div class="flw-rt-mini-bar-gold"><div class="flw-rt-mini-fill-gold" style="width:${gPct}%"></div></div>
            </td></tr>`;

            // Cabeçalhos com HC total por área
            const areaHeaders = sortedAllAreas.map(a => {
                const d = areaTotaisGeral[a];
                return `<th><div class="flw-rt-th-area">
                    <span class="flw-rt-th-name">${a}</span>
                    <span class="flw-rt-th-hc">${fmt(d.total)} HC</span>
                </div></th>`;
            }).join('');

            // ══ HC Previsto por Escala ════════════════════════════════════════
            // 1. HC mensal por turno (todos os registros do mês, excluindo cargos/áreas)
            const hcMesTurnoSet = {};
            registrosPresenca.forEach(r => {
                if (cargoGestorExcluidoFlw(r.cargo_gestor)) return;
                if (normalizarArea(r.area) === '__EXCLUIR__') return;
                const t = r.turno || 'Sem Turno';
                if (!hcMesTurnoSet[t]) hcMesTurnoSet[t] = new Set();
                if (r.colaborador) hcMesTurnoSet[t].add(r.colaborador);
            });
            const turnosMesAll = Object.keys(hcMesTurnoSet).sort((a, b) => a.localeCompare(b));
            const totalHCMes   = new Set(
                registrosPresenca
                    .filter(r => !cargoGestorExcluidoFlw(r.cargo_gestor) && normalizarArea(r.area) !== '__EXCLUIR__')
                    .map(r => r.colaborador).filter(Boolean)
            ).size;

            // 2. Turnos em folga hoje (aparecem no mês mas não hoje)
            const turnosHojeSet = new Set(turnoKeys);
            const turnosOffHoje = turnosMesAll.filter(t => !turnosHojeSet.has(t));
            const hcEmFolga     = turnosOffHoje.reduce((s, t) => s + hcMesTurnoSet[t].size, 0);

            // 3. Taxa histórica de falta (dias concluídos do mês, excluindo o dia atual)
            let _hDen = 0, _hFalt = 0;
            const _hDias = new Set();
            registrosPresenca.forEach(r => {
                if (cargoGestorExcluidoFlw(r.cargo_gestor)) return;
                if (normalizarArea(r.area) === '__EXCLUIR__') return;
                const data = r.data_abs || r.data || r.start_date;
                if (!data) return;
                const dr = typeof data === 'string' ? data.split('T')[0] : new Date(data).toISOString().split('T')[0];
                if (dr === dataStr) return; // excluir dia selecionado
                const s = (r.status_presenca || '').toUpperCase();
                if (!s) return; // pular pendentes — dia não processado
                if (isPresente(r.status_presenca)) { _hDias.add(dr); _hDen++; }
                else if (s.includes('FALTA') || s.includes('FALTOU')) { _hDias.add(dr); _hDen++; _hFalt++; }
            });
            const taxaHistFalta = _hDen > 0 ? _hFalt / _hDen : 0;
            const pctHistFalta  = (taxaHistFalta * 100).toFixed(1);
            const nDiasHist     = _hDias.size;
            const hcEfetivoEsp  = Math.round(totalHC * (1 - taxaHistFalta));
            const hcFaltasEsp   = totalHC - hcEfetivoEsp;

            // 4. Aus. Programadas por turno = escalados × Falta Esperada %
            //    (fórmula baseada no input do usuário, não em dados do banco)
            const _ausProgPorTurno = {};
            turnosMesAll.forEach(t => {
                if (!turnosHojeSet.has(t)) { _ausProgPorTurno[t] = 0; return; }
                const esc = porTurno[t] ? porTurno[t]._rows.length : 0;
                _ausProgPorTurno[t] = Math.round(esc * _faltaEsperadaPct / 100);
            });
            const _totalAusProg  = Object.values(_ausProgPorTurno).reduce((s, v) => s + v, 0);
            const _totalPrevisto = Math.max(0, totalHC - _totalAusProg);
            // Efetivo = Previsto (falta já descontada via Aus. Prog.)

            // Cache dos dados do painel para recálculo ao alterar Falta Esperada
            _escalaPanelCache = {
                fonte: 'historico',
                porTurnoEsc: Object.fromEntries(turnosMesAll.map(t => [t, {
                    ativo: turnosHojeSet.has(t),
                    esc:   turnosHojeSet.has(t) ? (porTurno[t] ? porTurno[t]._rows.length : 0) : 0,
                    cor:   turnoCores[t] || '#94a3b8'
                    // ausProg é sempre calculado em tempo real: esc × _faltaEsperadaPct / 100
                }])),
                totalEsc: totalHC,
            };

            const _escalaLinhas = _gerarLinhasEscala(_escalaPanelCache.porTurnoEsc);
            const _escalaNota = `<div class="flw-escala-nota" id="escalaNota">
                <svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Escalados = registros do dia (histórico). <strong>Aus. Programadas</strong> = dados reais da aba de Ausências. <strong style="color:rgba(251,191,36,.7)">Aus. Simuladas</strong> = Escalados × Falta Esperada % (ajuste o input para recalcular).
                <span id="escalaNota2">${turnosOffHoje.length > 0 ? ' Turnos de folga hoje: <strong>' + turnosOffHoje.join(', ') + '</strong>.' : ''}</span>
            </div>`;

            html += `
            <div class="flw-escala-panel" id="escalaPanel">
                <div class="flw-escala-header" onclick="toggleEscalaPanel()">
                    <div class="flw-escala-header-left">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                        HC Previsto do Dia — por Escala
                    </div>
                    <div class="flw-escala-toggle">Ocultar <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></div>
                </div>
                <div class="flw-escala-body">
                    ${_buildEscalaKpiRow(totalHC, _totalAusProg, _totalPrevisto, turnoKeys.length, turnosOffHoje, cntPresente)}
                    <div class="flw-escala-table-wrap">
                        <table class="flw-escala-table">
                            <thead><tr>
                                <th>Turno</th>
                                <th>Escalados Hoje</th>
                                <th>Aus. Programadas</th>
                                <th title="Ausências calculadas pela % de absenteísmo configurada acima" style="color:rgba(251,191,36,.7);">Aus. Simuladas</th>
                                <th>Previsto</th>
                                <th>Absent. %</th>
                                <th>Efetivo Esp.</th>
                                <th>Status</th>
                            </tr></thead>
                            <tbody id="escalaLinhasBody">${_escalaLinhas}</tbody>
                        </table>
                    </div>
                    ${_escalaNota}
                </div>
            </div>`;

            const alertaCritico = '';

            // ── Pendentes por Turno — painel read-only ─────────────────────────
            if (grandPend > 0) {
                const _pendRgbs = { T1:'129,140,248', T2:'56,189,248', T3:'52,211,153', T4:'251,191,36', ADM:'255,215,0' };
                const _pendCards = turnoKeys.map(turno => {
                    const rows  = porTurno[turno]._rows;
                    const pend  = rows.filter(r => !r.status_presenca || r.status_presenca === '').length;
                    if (!pend) return '';
                    const hcT   = rows.length;
                    const pct   = hcT > 0 ? Math.round(((hcT - pend) / hcT) * 100) : 100;
                    const color = turnoCores[turno] || '#94a3b8';
                    const rgb   = _pendRgbs[turno] || '148,163,184';
                    // Avatares dos gestores com pendentes
                    const gMap = new Map();
                    rows.filter(r => !r.status_presenca || r.status_presenca === '').forEach(r => { if (r.gestor) gMap.set(r.gestor, true); });
                    const gList = [...gMap.keys()];
                    const avHtml = gList.slice(0,4).map(nome => {
                        const pts = nome.trim().split(/\s+/).filter(w => w.length > 1);
                        const ini = pts.length >= 2 ? (pts[0][0]+pts[pts.length-1][0]).toUpperCase() : nome.slice(0,2).toUpperCase();
                        return `<span class="flw-tc-gest-av" title="${nome}" style="background:rgba(${rgb},.1);color:${color};border-color:rgba(${rgb},.22)">${ini}</span>`;
                    }).join('') + (gList.length > 4 ? `<span class="flw-tc-gest-av flw-tc-gest-more">+${gList.length-4}</span>` : '');
                    return `
                    <div class="flw-pend-card" style="--tc:${color};--tc-rgb:${rgb}">
                        <div class="flw-pend-card-top">
                            <span class="flw-pend-card-badge">${turno}</span>
                            <div class="flw-pend-card-cnt">${fmt(pend)}<span class="flw-pend-card-cnt-lbl">pend.</span></div>
                        </div>
                        <div class="flw-tc-gest-row" style="margin:0 0 6px">${avHtml}</div>
                        <div class="flw-pend-card-meta">${hcT} escalados · ${pct}% concluído</div>
                        <div class="flw-tc-bar-wrap"><div class="flw-tc-bar" style="width:${pct}%;background:linear-gradient(90deg,${color},rgba(${rgb},.45))"></div></div>
                    </div>`;
                }).filter(Boolean).join('');

                if (_pendCards) {
                    html += `
                    <div class="flw-pend-section">
                        <div class="flw-pend-section-hdr">
                            <div class="flw-pend-section-title">
                                <span class="flw-pend-dot-anim"></span>
                                Pendentes por Turno
                            </div>
                            <div class="flw-pend-section-count">${fmt(grandPend)} aguardando registro</div>
                        </div>
                        <div class="flw-pend-grid">${_pendCards}</div>
                    </div>`;
                }
            }

            html += `
            <div class="flw-resumo-panel" id="resumoPanel">
                <div class="flw-resumo-header" onclick="toggleResumo()">
                    <div class="flw-resumo-header-left">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        Resumo HC — Turno × Área
                        <span class="flw-resumo-ts">· Snapshot ${ts}</span>
                    </div>
                    <div class="flw-resumo-toggle">
                        Ocultar
                        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
                    </div>
                </div>
                ${alertaCritico}
                <div class="flw-resumo-body">
                    <table class="flw-resumo-table">
                        <thead>
                            <tr>
                                <th>Turno</th>
                                ${areaHeaders}
                                <th style="border-left:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.015);color:rgba(148,163,184,.45);">Pendentes</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>${summaryRows}${footerRow}</tbody>
                    </table>
                    <div class="flw-rt-legend">
                        <span style="font-size:9.5px;color:rgba(255,255,255,.25);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-right:4px;">Legenda</span>
                        <div class="flw-rt-legend-item"><div class="flw-rt-legend-dot" style="background:rgba(148,163,184,.4)"></div><span class="flw-rt-legend-label">≥ 85% presentes</span></div>
                        <div class="flw-rt-legend-item"><div class="flw-rt-legend-dot" style="background:rgba(148,163,184,.25)"></div><span class="flw-rt-legend-label">60–84% presentes</span></div>
                        <div class="flw-rt-legend-item"><div class="flw-rt-legend-dot" style="background:rgba(148,163,184,.12)"></div><span class="flw-rt-legend-label">&lt; 60% presentes</span></div>
                        <div class="flw-rt-legend-item">
                            <div class="flw-rt-legend-dot" style="background:rgba(148,163,184,.3)"></div><span class="flw-rt-legend-label">Pendentes = aguardando registro</span>
                        </div>
                    </div>
                </div>
            </div>`;

            html += `<div id="previsaoPanel"></div>`;

            detalhesContainer.innerHTML = html;
            carregarPrevisaoHC(dataStr);
            carregarEscalasDia(dataStr);
            return;
        }

        // ════════════════════════════════════════════════════════════════════
        // NÍVEL 2 — Seleção de Área (dentro do turno ativo)
        // ════════════════════════════════════════════════════════════════════
        const activeTurnoData = porTurno[_detalhesTurnoAtivo];
        const areaKeys = Object.keys(activeTurnoData.areas).sort((a, b) => a.localeCompare(b));

        if (_detalhesAreaAtiva === null) {
            let html = kpiHtml;
            html += `
                <div class="flw-breadcrumb">
                    <button class="flw-bc-back" onclick="voltarParaTurnos()">
                        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                        Turnos
                    </button>
                    <span class="flw-bc-sep">›</span>
                    <span class="flw-bc-item bc-active">${_detalhesTurnoAtivo}</span>
                </div>
                <div class="flw-nav-heading">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    Selecione a Área — <span style="color:#FFD700;font-size:.95em">&nbsp;${_detalhesTurnoAtivo}</span>
                </div>
                <div class="flw-nav-hint">Toque no card para ver os gestores · números = presentes / total por setor</div>
                <div class="flw-turno-grid">`;
            areaKeys.forEach(area => {
                const areaRows = activeTurnoData.areas[area]._rows;
                html += buildAreaCard(area, areaRows,
                    `switchDetalheArea('${area.replace(/'/g,"\\'")}')` );
            });
            html += `</div>`;
            detalhesContainer.innerHTML = html;
            return;
        }

        // ════════════════════════════════════════════════════════════════════
        // NÍVEL 3 — Detalhe de Área (gestores)
        // ════════════════════════════════════════════════════════════════════
        const areaData  = activeTurnoData.areas[_detalhesAreaAtiva];
        const areaRows  = areaData._rows;
        const totalArea = areaRows.length;
        const pPres     = areaRows.filter(r => isPresente(r.status_presenca)).length;
        const pct       = totalArea > 0 ? Math.round((pPres / totalArea) * 100) : 0;
        const barClass  = pct >= 85 ? 'ok' : pct >= 60 ? 'warn' : 'bad';
        const abClass   = pct >= 85 ? 'ab-ok' : pct >= 60 ? 'ab-warn' : 'ab-bad';

        let html = kpiHtml;
        html += `
            <div class="flw-breadcrumb">
                <button class="flw-bc-back" onclick="voltarParaAreas()">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                    Áreas
                </button>
                <span class="flw-bc-sep">›</span>
                <span class="flw-bc-item">${_detalhesTurnoAtivo}</span>
                <span class="flw-bc-sep">›</span>
                <span class="flw-bc-item bc-active">${_detalhesAreaAtiva}</span>
            </div>
            <div class="flw-search-row">
                <div class="flw-detalhes-search">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="detalhesSearch" placeholder="Buscar gestor..." oninput="filtrarDetalhes(this.value)" autocomplete="off" />
                    <span class="flw-detalhes-search-count" id="detalhesSearchCount">${Object.keys(areaData.setores).length} setor${Object.keys(areaData.setores).length !== 1 ? 'es' : ''}</span>
                </div>
            </div>
            <div class="det-area-block ${abClass}" data-area="${_detalhesAreaAtiva.toLowerCase()}">
                <div class="det-area-body">
                    <div class="det-prog-wrap"><div class="det-prog-fill ${barClass}" style="width:${pct}%"></div></div>
                    <div class="det-prog-label">${pct}% presença · ${fmt(totalArea)} colaboradores</div>`;

        Object.entries(areaData.setores).sort((a, b) => a[0].localeCompare(b[0])).forEach(([setor, gestores]) => {
            html += `<div class="det-setor-group" data-setor="${setor.toLowerCase()}">
                <div class="det-setor-lbl">${setor}</div>`;
            Object.entries(gestores).sort((a, b) => a[0].localeCompare(b[0])).forEach(([gestorNome, gRows]) => {
                const initials  = gestorInitials(gestorNome);
                const searchKey = [_detalhesAreaAtiva, setor, gestorNome].join(' ').toLowerCase();
                const gPres     = gRows.filter(r => isPresente(r.status_presenca)).length;
                const gTotal    = gRows.length;
                const gPct      = gTotal > 0 ? Math.round((gPres / gTotal) * 100) : 0;
                const avClass   = gPct >= 85 ? 'av-ok' : gPct >= 60 ? 'av-warn' : 'av-bad';
                const C         = 75.4;
                const ringFill  = Math.round((gPct / 100) * C);
                const ringColor = gPct >= 85 ? '#10b981' : gPct >= 60 ? '#fbbf24' : '#f87171';
                html += `
                <div class="det-gestor-row" data-search="${searchKey}" data-gestor="${gestorNome.toLowerCase()}" style="--pct:${gPct}%">
                    <div class="det-g-avatar ${avClass}">${initials}</div>
                    <div class="det-g-info">
                        <div class="det-g-name">${gestorNome}</div>
                        <div class="det-g-meta">${setor} · ${fmt(gTotal)} colab.</div>
                    </div>
                    ${statusPills(gRows)}
                    <div class="det-g-pct-ring">
                        <svg viewBox="0 0 32 32">
                            <circle class="ring-bg"   cx="16" cy="16" r="12" stroke-dasharray="${C} ${C}"/>
                            <circle class="ring-fill" cx="16" cy="16" r="12" stroke="${ringColor}" stroke-dasharray="${ringFill} ${C}"/>
                        </svg>
                        <div class="det-g-pct-text">
                            <span class="det-g-pct-num">${gPct}%</span>
                            <span class="det-g-pct-sub">pres.</span>
                        </div>
                    </div>
                </div>`;
            });
            html += `</div>`;
        });

        html += `</div></div>`;
        detalhesContainer.innerHTML = html;
    }

    // ── Toggle área (collapsible) ─────────────────────────────────────────────
    function toggleDetalhesArea(hdr) {
        hdr.closest('.det-area-block').classList.toggle('collapsed');
    }

    // ── Expandir todas as áreas ───────────────────────────────────────────────
    function expandirTudo() {
        document.querySelectorAll('#detalhesContainer .det-area-block').forEach(b => {
            b.classList.remove('collapsed');
        });
    }

    // ── Recolher todas as áreas ───────────────────────────────────────────────
    function recolherTudo() {
        document.querySelectorAll('#detalhesContainer .det-area-block').forEach(b => {
            b.classList.add('collapsed');
        });
    }

    // ── Navegação drill-down: Turno → Área → Gestores ─────────────────────────
    function switchDetalheTurno(turno) {
        _detalhesTurnoAtivo = turno;
        _detalhesAreaAtiva  = null;
        if (dataSelecionada) renderDetalhes(dataSelecionada);
    }

    function switchDetalheArea(area) {
        _detalhesAreaAtiva = area;
        if (dataSelecionada) renderDetalhes(dataSelecionada);
    }

    function voltarParaTurnos() {
        _detalhesTurnoAtivo = null;
        _detalhesAreaAtiva  = null;
        if (dataSelecionada) renderDetalhes(dataSelecionada);
    }

    function voltarParaAreas() {
        _detalhesAreaAtiva = null;
        if (dataSelecionada) renderDetalhes(dataSelecionada);
    }

    // ── Toggle painel de resumo ───────────────────────────────────────────────
    function toggleResumo() {
        const panel  = document.getElementById('resumoPanel');
        if (!panel) return;
        panel.classList.toggle('collapsed');
        const toggle = panel.querySelector('.flw-resumo-toggle');
        if (toggle) {
            const isCollapsed = panel.classList.contains('collapsed');
            toggle.childNodes[0].textContent = isCollapsed ? 'Expandir' : 'Ocultar';
        }
    }

    // ── Previsão de HC do Dia ────────────────────────────────────────────────

    // ── Helpers do painel Escala ─────────────────────────────────────────────

    function _buildEscalaKpiRow(totalEsc, ausProg, previsto, nAtivos, turnosOff, realPresentes) {
        // ausProg  = totalEsc × _faltaEsperadaPct / 100
        // previsto = totalEsc − ausProg
        // realPresentes = pessoas confirmadas na catraca (dado real, não fórmula)
        const subEsc    = `${nAtivos} turno${nAtivos !== 1 ? 's' : ''} ativos${turnosOff.length > 0 ? ' · ' + turnosOff.join(', ') + ' em folga' : ''}`;
        const pctReal   = totalEsc > 0 ? Math.round((realPresentes / totalEsc) * 100) : 0;
        return `
        <div class="flw-escala-kpi-row" id="escalaKpiRow">
            <div class="flw-escala-kpi kpi-prev">
                <div class="flw-escala-kpi-val" id="kpiEscalados">${fmt(totalEsc)}</div>
                <div class="flw-escala-kpi-lbl">Escalados Hoje</div>
                <div class="flw-escala-kpi-sub" id="kpiEscaladosSub">${subEsc}</div>
            </div>
            <div class="flw-escala-kpi kpi-aus">
                <div class="flw-escala-kpi-val" id="kpiAusProg">${fmt(ausProg)}</div>
                <div class="flw-escala-kpi-lbl">Aus. Programadas</div>
                <div class="flw-escala-kpi-sub" id="kpiAusProgSub">${_taxaAbsHistorico ? 'taxa histórica 30d' : 'escalados × ' + _faltaEsperadaPct + '%'}</div>
            </div>
            <div class="flw-escala-kpi kpi-efet">
                <div class="flw-escala-kpi-val" id="kpiPrevisto">${fmt(previsto)}</div>
                <div class="flw-escala-kpi-lbl">Previsto do Dia</div>
                <div class="flw-escala-kpi-sub">escalados − aus. programadas</div>
            </div>
            <div class="flw-escala-kpi kpi-falta-input">
                <div class="flw-escala-kpi-val">
                    <div style="display:flex;align-items:center;gap:5px;justify-content:center;">
                        <button class="flw-falta-btn" onclick="alterarFaltaEsperada(-0.5)">−</button>
                        <span id="faltaEsperadaVal" style="font-size:22px;font-weight:800;color:#e2e8f0;min-width:40px;text-align:center;">${_faltaEsperadaPct}</span><span style="font-size:14px;color:rgba(148,163,184,.5);">%</span>
                        <button class="flw-falta-btn" onclick="alterarFaltaEsperada(0.5)">+</button>
                    </div>
                </div>
                <div class="flw-escala-kpi-lbl">Absenteísmo</div>
                <div class="flw-escala-kpi-sub">% aplicada sobre os escalados hoje</div>
            </div>
            <div class="flw-escala-kpi">
                <div class="flw-escala-kpi-val" id="kpiEfetivo" style="font-size:26px;">${fmt(realPresentes)}</div>
                <div class="flw-escala-kpi-lbl">Presente (Clock IN)</div>
                <div class="flw-escala-kpi-sub" id="kpiEfetivoSub">${pctReal}% dos escalados · catraca</div>
            </div>
        </div>`;
    }

    function _gerarLinhasEscala(porTurnoEsc) {
        return Object.entries(porTurnoEsc)
            .sort((a, b) => a[0].localeCompare(b[0]))
            .map(([t, d]) => {
                const { ativo, esc, cor, ausReal } = d;
                // Afastados/férias/INSS/maternidade NÃO entram no ABS do dia:
                //   hcEfetivo = escalados − ausências justificadas (CP_AUSENCIAS_PROGRAMADAS)
                //   ausSim    = hcEfetivo × % (simulação só sobre quem deve comparecer)
                //   prev      = hcEfetivo − ausSim
                const realVal    = (ativo && ausReal != null) ? ausReal : null;
                const ausRealVal = realVal !== null ? realVal : 0;
                const hcEfetivo  = ativo ? Math.max(0, esc - ausRealVal) : 0;
                const ausSim     = ativo ? Math.round(hcEfetivo * _faltaEsperadaPct / 100) : 0;
                const prev       = ativo ? Math.max(0, hcEfetivo - ausSim) : 0;
                const realHtml   = !ativo ? '—'
                    : realVal === null
                        ? `<span style="color:rgba(148,163,184,.3);font-size:10px;">aguardando…</span>`
                        : realVal > 0
                            ? `<span style="font-weight:700;color:#f87171;">${fmt(realVal)}</span>`
                            : `<span style="color:rgba(74,222,128,.55);">0</span>`;
                return `<tr class="${ativo ? '' : 'flw-escala-row-off'}" data-turno="${t}" data-esc="${esc}" data-ausreal="${ausRealVal}">
                    <td><span class="flw-escala-turno-tag" style="color:${cor};border-color:${cor}33">${t}</span></td>
                    <td>${ativo ? fmt(esc) : '<span class="flw-escala-off-txt">folga</span>'}</td>
                    <td class="aus-real-cell">${realHtml}</td>
                    <td class="aus-sim-cell">${ativo ? `<span style="font-weight:700;color:rgba(251,191,36,.8);">${fmt(ausSim)}</span>` : '—'}</td>
                    <td class="previsto-cell">${ativo ? `<span class="flw-escala-efet-val">${fmt(prev)}</span>` : '—'}</td>
                    <td class="falta-esp-cell">${ativo ? `<span style="color:rgba(148,163,184,.55);font-size:11px;">${_faltaEsperadaPct}%</span>` : '—'}</td>
                    <td class="efetivo-esp-cell">${ativo ? `<span class="flw-escala-falt-cnt">${fmt(prev)}</span>` : '—'}</td>
                    <td>${ativo ? `<span class="flw-escala-st ativo">● Ativo</span>` : `<span class="flw-escala-st folga">○ Folga</span>`}</td>
                </tr>`;
            }).join('');
    }

    // Calcula ausências reais por turno cruzando ausenciasDia com _idgrootTurnoMap
    // Conta apenas justificativas de exclusão: DSR, INSS, Maternidade, Atestado, Férias
    function _computeAusReal() {
        const map = {};
        ausenciasDia.filter(a => _ehAusenciaExclusao(a.justificativa)).forEach(a => {
            const turno = _idgrootTurnoMap[String(a.idgroot || '')];
            if (!turno) return;
            map[turno] = (map[turno] || 0) + 1;
        });
        return map;
    }

    // Atualiza ausências reais (chamado quando ausenciasDia chega async)
    // Além de mostrar o valor, salva data-ausreal e recalcula ausSim/prev:
    //   hcEfetivo = esc − ausReal  (afastados/férias/INSS não entram no ABS)
    //   ausSim    = hcEfetivo × %
    //   prev      = hcEfetivo − ausSim
    function _atualizarAusRealCells() {
        const ausRealPorTurno = _computeAusReal();
        document.querySelectorAll('#escalaLinhasBody tr[data-turno]').forEach(row => {
            const t = row.dataset.turno;
            if (row.classList.contains('flw-escala-row-off')) return;

            const esc = parseInt(row.dataset.esc || 0);
            const val = ausRealPorTurno[t] !== undefined ? ausRealPorTurno[t] : 0;

            // 1. Salva ausReal no data-attribute (lido por alterarFaltaEsperada)
            row.dataset.ausreal = val;

            // 2. Atualiza célula Aus. Programadas
            const cellReal = row.querySelector('.aus-real-cell');
            if (cellReal) cellReal.innerHTML = val > 0
                ? `<span style="font-weight:700;color:#f87171;">${fmt(val)}</span>`
                : `<span style="color:rgba(74,222,128,.55);">0</span>`;

            // 3. Recalcula ausSim e prev com base no hcEfetivo
            const hcEfetivo = Math.max(0, esc - val);
            const ausSim    = Math.round(hcEfetivo * _faltaEsperadaPct / 100);
            const prev      = Math.max(0, hcEfetivo - ausSim);

            const cellAus = row.querySelector('.aus-sim-cell');
            if (cellAus) cellAus.innerHTML = ausSim > 0
                ? `<span style="font-weight:700;color:rgba(251,191,36,.8);">${fmt(ausSim)}</span>`
                : `<span style="color:rgba(74,222,128,.5);">0</span>`;

            const cellPrev = row.querySelector('.previsto-cell');
            if (cellPrev) cellPrev.innerHTML = `<span class="flw-escala-efet-val">${fmt(prev)}</span>`;

            const cellEfet = row.querySelector('.efetivo-esp-cell');
            if (cellEfet) cellEfet.innerHTML = `<span class="flw-escala-falt-cnt">${fmt(prev)}</span>`;
        });

        // 4. Atualiza KPIs totais
        _recalcularKpiTotais();
    }
    window._atualizarAusRealCells = _atualizarAusRealCells;

    // Altera a % de falta esperada — recalcula TUDO em cascata (Aus. Prog → Previsto → Efetivo)
    function alterarFaltaEsperada(delta) {
        _faltaEsperadaPct = Math.round(Math.max(0, Math.min(50, _faltaEsperadaPct + delta)) * 10) / 10;

        const valEl = document.getElementById('faltaEsperadaVal');
        if (valEl) valEl.textContent = _faltaEsperadaPct;

        if (!_escalaPanelCache) return;
        // kpiEfetivo = Efetivo Real (catraca) — não altera ao mudar Falta Esperada

        // Linhas da tabela: recalcula com hcEfetivo = esc − ausReal (afastados excluídos)
        document.querySelectorAll('#escalaLinhasBody tr[data-esc]').forEach(row => {
            const esc      = parseInt(row.dataset.esc    || 0);
            if (esc === 0) return;
            const ausReal  = parseInt(row.dataset.ausreal || 0);
            const hcEfetivo = Math.max(0, esc - ausReal);
            const aus      = Math.round(hcEfetivo * _faltaEsperadaPct / 100);
            const prev     = Math.max(0, hcEfetivo - aus);

            const cellAus = row.querySelector('.aus-sim-cell');
            if (cellAus) cellAus.innerHTML = aus > 0
                ? `<span style="font-weight:700;color:rgba(251,191,36,.8);">${fmt(aus)}</span>`
                : `<span style="color:rgba(74,222,128,.5);">0</span>`;

            const cellPrev = row.querySelector('.previsto-cell');
            if (cellPrev) cellPrev.innerHTML = `<span class="flw-escala-efet-val">${fmt(prev)}</span>`;

            const cellF = row.querySelector('.falta-esp-cell');
            if (cellF) cellF.innerHTML = `<span style="color:rgba(251,191,36,.7);font-size:11px;">${_faltaEsperadaPct}%</span>`;

            const cellE = row.querySelector('.efetivo-esp-cell');
            if (cellE) cellE.innerHTML = `<span class="flw-escala-falt-cnt">${fmt(prev)}</span>`;
        });

        // Atualiza KPIs totais
        _recalcularKpiTotais();
    }
    window.alterarFaltaEsperada = alterarFaltaEsperada;

    // Recalcula KPIs totais (Escalados, Aus.Prog, Previsto) somando as linhas da tabela
    // Usa data-esc e data-ausreal de cada linha para calcular hcEfetivo correto
    function _recalcularKpiTotais() {
        let totalEsc = 0, totalAusReal = 0;
        document.querySelectorAll('#escalaLinhasBody tr[data-esc]').forEach(row => {
            if (row.classList.contains('flw-escala-row-off')) return;
            totalEsc     += parseInt(row.dataset.esc     || 0);
            totalAusReal += parseInt(row.dataset.ausreal || 0);
        });
        const totalHcEfetivo = Math.max(0, totalEsc - totalAusReal);
        const ausProg        = Math.round(totalHcEfetivo * _faltaEsperadaPct / 100);
        const previsto       = Math.max(0, totalHcEfetivo - ausProg);

        const kpiAus = document.getElementById('kpiAusProg');
        if (kpiAus) kpiAus.textContent = fmt(ausProg);
        const kpiAusSub = document.getElementById('kpiAusProgSub');
        if (kpiAusSub) kpiAusSub.textContent = _taxaAbsHistorico
            ? `taxa histórica ${_taxaAbsHistorico.diasCalculo || 30}d`
            : `HC efetivo × ${_faltaEsperadaPct}%`;

        const kpiPrev = document.getElementById('kpiPrevisto');
        if (kpiPrev) kpiPrev.textContent = fmt(previsto);
    }

    // ── Carga de ausenciasDia em background ─────────────────────────────────
    // Chamada sempre que uma data é selecionada (não só quando o painel Previsão é aberto).
    // Assim, os KPI chips, o card de Absenteísmo e a coluna Aus. Reais da tabela de escala
    // já refletem as ausências programadas desde o primeiro clique no calendário.
    function _carregarAusenciasDia(dataStr) {
        // Cache: dados já carregados para esta data — só re-renderiza
        if (prevDataCarregada === dataStr) {
            if (dataSelecionada === dataStr) {
                renderDetalhes(dataStr);
                atualizarCardAbsenteismo(dataStr);
            }
            _atualizarAusRealCells();
            return;
        }
        // Busca em background (não bloqueia a tela — renderDetalhes já rodou com [] vazio)
        google.script.run
            .withSuccessHandler(function(data) {
                ausenciasDia      = data || [];
                prevDataCarregada = dataStr;
                // Re-renderiza somente se o usuário ainda está nessa data
                if (dataSelecionada === dataStr) {
                    renderDetalhes(dataStr);
                    atualizarCardAbsenteismo(dataStr);
                }
                // Atualiza coluna Aus. Reais na tabela de escala (se ela já estiver no DOM)
                _atualizarAusRealCells();
                // Se o painel Previsão HC estiver aberto, atualiza ele também
                const prevPanel = document.getElementById('previsaoPanel');
                if (prevPanel && prevPanel.querySelector('.flw-prev-panel')) {
                    renderPrevisaoPanel(dataStr);
                }
            })
            .withFailureHandler(function() {
                ausenciasDia      = [];
                prevDataCarregada = dataStr;
            })
            .getAusenciasProgramadasDia(dataStr);
    }

    function carregarPrevisaoHC(dataStr) {
        const panel = document.getElementById('previsaoPanel');
        if (!panel) return;
        // Cache: re-usa dados já carregados por _carregarAusenciasDia ou por chamada anterior
        if (prevDataCarregada === dataStr) {
            renderPrevisaoPanel(dataStr);
            return;
        }
        panel.innerHTML = `
            <div class="flw-prev-panel">
                <div class="flw-prev-header">
                    <div class="flw-prev-header-left">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        Previsão de HC do Dia
                    </div>
                </div>
                <div class="flw-prev-body">
                    <div class="flw-prev-loading"><div class="flw-prev-loading-dot"></div> Buscando ausências programadas…</div>
                </div>
            </div>`;
        google.script.run
            .withSuccessHandler(function(data) {
                ausenciasDia      = data || [];
                prevDataCarregada = dataStr;
                renderPrevisaoPanel(dataStr);
                // Atualiza coluna "Aus. Programadas" (reais) na tabela de escala
                _atualizarAusRealCells();
                // Re-renderiza KPI chips e card de absenteísmo com os novos dados
                if (dataSelecionada === dataStr) {
                    renderDetalhes(dataStr);
                    atualizarCardAbsenteismo(dataStr);
                }
            })
            .withFailureHandler(function() {
                ausenciasDia      = [];
                prevDataCarregada = dataStr;
                renderPrevisaoPanel(dataStr);
                _atualizarAusRealCells();
            })
            .getAusenciasProgramadasDia(dataStr);
    }

    function togglePrevisaoPanel() {
        const panel = document.getElementById('previsaoPanel');
        if (!panel) return;
        const fp = panel.querySelector('.flw-prev-panel');
        if (!fp) return;
        fp.classList.toggle('collapsed');
        const toggle = fp.querySelector('.flw-prev-toggle');
        if (toggle) {
            const isCollapsed = fp.classList.contains('collapsed');
            toggle.childNodes[0].textContent = isCollapsed ? 'Mostrar ' : 'Ocultar ';
        }
    }

    function togglePrevList() {
        const wrap = document.getElementById('prevListWrap');
        if (wrap) wrap.classList.toggle('flw-prev-list-open');
    }

    function renderPrevisaoPanel(dataStr) {
        const panel = document.getElementById('previsaoPanel');
        if (!panel) return;

        // ── Fórmula Previsão HC ───────────────────────────────────────────────
        // HC_BASE     = escalados hoje (via escalasDia, exclui turma DSR)
        // AUSENCIAS   = CP_AUSENCIAS_PROGRAMADAS filtradas por justificativas de exclusão
        // TAXA_ABS    = histórico 30 dias (faltas FI / total operacional)
        // PREVISAO    = (HC_BASE − AUSENCIAS) × (1 − TAXA_ABS)
        //
        // Para datas passadas (histórico) usa registrosPresenca como base.

        const isHoje = dataStr === new Date().toISOString().split('T')[0];

        // HC Base: escalados hoje quando disponível (escalasDia carregado para este dia)
        const hcBase = (isHoje && escalasDia && escalasDia.rows && escalasDia.rows.length > 0)
            ? escalasDia.rows.length
            : (() => {
                // Fallback: conta registros do dia no histórico
                let reg = registrosPresenca.filter(r => {
                    const data = r.data_abs || r.data || r.start_date;
                    if (!data) return false;
                    return (typeof data === 'string' ? data.split('T')[0]
                           : new Date(data).toISOString().split('T')[0]) === dataStr;
                });
                if (areasSelecionadas.size > 0)
                    reg = reg.filter(r => areasSelecionadas.has(normalizarArea(r.area)));
                if (turnosSelecionados.size > 0)
                    reg = reg.filter(r => turnosSelecionados.has(r.turno || 'Sem Turno'));
                return reg.length;
            })();

        // Ausências de exclusão: DSR, INSS, Maternidade, Atestado, Férias
        const ausExclusao = ausenciasDia.filter(a => _ehAusenciaExclusao(a.justificativa));
        const programados  = ausExclusao.length;
        const programadosTodos = ausenciasDia.length; // para breakdown visual

        // HC disponível (base − ausências programadas)
        const hcDisponivel = Math.max(0, hcBase - programados);

        // Taxa histórica (usa _faltaEsperadaPct que é atualizado assincronamente)
        const taxa       = _faltaEsperadaPct / 100;
        const taxaLabel  = _taxaAbsHistorico
            ? `${_faltaEsperadaPct}% (histórico ${_taxaAbsHistorico.diasCalculo || 30}d)`
            : `${_faltaEsperadaPct}% (manual)`;

        // Previsão final
        const hcPrevisao    = Math.max(0, Math.round(hcDisponivel * (1 - taxa)));
        const ausAbsEsperada = hcDisponivel - hcPrevisao;
        const pctCob         = hcBase > 0 ? Math.round((hcPrevisao / hcBase) * 100) : 100;

        // Cross-ref faltas vs programados por nome (para detalhes históricos)
        const nomesExclusao = new Set(ausExclusao.map(a => (a.colaborador || '').trim().toLowerCase()));
        let presentesDia = registrosPresenca.filter(r => {
            const data = r.data_abs || r.data || r.start_date;
            if (!data) return false;
            return (typeof data === 'string' ? data.split('T')[0]
                   : new Date(data).toISOString().split('T')[0]) === dataStr;
        });
        const faltas     = presentesDia.filter(r => { const s=(r.status_presenca||'').toUpperCase(); return s.includes('FALTA')||s.includes('FALTOU'); });
        const faltasSurp = faltas.filter(r => !nomesExclusao.has((r.colaborador||'').trim().toLowerCase()));

        const [yyyy, mm, dd] = dataStr.split('-');
        const dataFmt = `${dd}/${mm}/${yyyy}`;

        // Breakdown por justificativa
        const justMap = {};
        ausenciasDia.forEach(a => {
            const j = (a.justificativa || 'SEM JUSTIFICATIVA').trim();
            justMap[j] = (justMap[j] || 0) + 1;
        });
        const maxJust = Math.max(1, ...Object.values(justMap));
        const justRows = Object.entries(justMap)
            .sort((a, b) => b[1] - a[1])
            .map(([j, cnt]) => `
                <div class="flw-prev-just-row">
                    <div class="flw-prev-just-label" title="${j}">${j}</div>
                    <div class="flw-prev-just-bar-wrap">
                        <div class="flw-prev-just-bar-fill" style="width:${Math.round((cnt/maxJust)*100)}%"></div>
                    </div>
                    <div class="flw-prev-just-count">${fmt(cnt)}</div>
                </div>`)
            .join('');

        // Lista ordenada por colaborador
        const listItems = ausenciasDia
            .slice().sort((a, b) => (a.colaborador||'').localeCompare(b.colaborador||''))
            .map(a => `
                <div class="flw-prev-list-item">
                    <div>
                        <div class="flw-prev-list-collab">${a.colaborador || '—'}</div>
                        <div class="flw-prev-list-meta">${a.gestor || '—'} · ${a.escala || '—'}</div>
                    </div>
                    <div class="flw-prev-list-meta" style="text-align:right">${a.justificativa || '—'}</div>
                </div>`)
            .join('');

        // Banner surpresas — só aparece em dias passados com histórico real
        const surpBadge = (!isHoje && faltas.length > 0 && faltasSurp.length > 0)
            ? `<div style="display:flex;align-items:center;gap:6px;padding:7px 16px;background:rgba(251,191,36,.06);border-bottom:1px solid rgba(251,191,36,.1);font-size:11px;color:rgba(251,191,36,.8);">
                <svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.2;flex-shrink:0;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <strong>${fmt(faltasSurp.length)}</strong> falta${faltasSurp.length !== 1 ? 's' : ''} surpresa${faltasSurp.length !== 1 ? 's' : ''} detectada${faltasSurp.length !== 1 ? 's' : ''} — não estavam programadas.
               </div>`
            : '';

        const bodyHtml = `<div class="flw-prev-kpi-row">
                <div class="flw-prev-kpi" style="border-color:rgba(139,92,246,.18);">
                    <div class="flw-prev-kpi-val" style="color:#a78bfa;">${fmt(hcBase)}</div>
                    <div class="flw-prev-kpi-lbl">HC Base</div>
                    <div class="flw-prev-kpi-sub">${isHoje ? 'escalados hoje' : 'histórico do dia'}</div>
                </div>
                <div class="flw-prev-kpi prog">
                    <div class="flw-prev-kpi-val">${fmt(programados)}</div>
                    <div class="flw-prev-kpi-lbl">Aus. Programadas</div>
                    <div class="flw-prev-kpi-sub">DSR · INSS · Mat. · Atestado · Férias</div>
                </div>
                <div class="flw-prev-kpi surp">
                    <div class="flw-prev-kpi-val" style="color:#fbbf24;">${fmt(ausAbsEsperada)}</div>
                    <div class="flw-prev-kpi-lbl">Abs. Esperada</div>
                    <div class="flw-prev-kpi-sub">${taxaLabel}</div>
                </div>
                <div class="flw-prev-kpi cob">
                    <div class="flw-prev-kpi-val" style="color:#2dd4bf;">${fmt(hcPrevisao)}</div>
                    <div class="flw-prev-kpi-lbl">Previsão HC</div>
                    <div class="flw-prev-kpi-sub">${pctCob}% do HC base</div>
                </div>
               </div>
               ${programadosTodos > 0 && justRows ? `<div class="flw-prev-just-section"><div class="flw-prev-just-title">Ausências Por Justificativa</div>${justRows}</div>` : ''}
               ${programadosTodos > 0 ? `<div id="prevListWrap">
                   <div class="flw-prev-list-toggle" onclick="togglePrevList()">
                       <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                       Ver lista (${fmt(programadosTodos)} ausência${programadosTodos !== 1 ? 's' : ''} programada${programadosTodos !== 1 ? 's' : ''})
                   </div>
                   <div class="flw-prev-list">${listItems}</div>
               </div>` : '<div class="flw-prev-empty">✓ Nenhuma ausência programada — absenteísmo estimado apenas pela taxa histórica.</div>'}`;

        panel.innerHTML = `
            <div class="flw-prev-panel">
                <div class="flw-prev-header" onclick="togglePrevisaoPanel()">
                    <div class="flw-prev-header-left">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        Previsão de HC — ${dataFmt}
                    </div>
                    <div class="flw-prev-toggle">Ocultar <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></div>

    // Expor funções de navegação ao escopo global (chamadas via onclick no HTML gerado)
    window.switchDetalheTurno  = switchDetalheTurno;
