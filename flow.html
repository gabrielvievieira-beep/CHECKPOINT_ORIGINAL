/* ─── Reset & Base ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }

body {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
}

/* ─── Topbar ─────────────────────────────────────────────────── */
.flw-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: rgba(10,16,34,.98);
    border-bottom: 1px solid rgba(255,255,255,.05);
    position: sticky;
    top: 0;
    z-index: 200;
    backdrop-filter: blur(12px);
}

.flw-tb-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* ── Topbar animated border ── */
.flw-topbar {
    position: relative;
}
.flw-topbar::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg,
        transparent 0%, rgba(255,215,0,0.75) 18%,
        rgba(99,102,241,0.6) 48%, rgba(56,189,248,0.6) 72%,
        rgba(255,215,0,0.45) 90%, transparent 100%);
    background-size: 300% 100%;
    animation: tb-sweep 7s ease-in-out infinite;
    pointer-events: none;
}
@keyframes tb-sweep {
    0%,100% { background-position:0% 0%;   opacity:.6; }
    50%      { background-position:100% 0%; opacity:1;  }
}

/* ── Icon ── */
.flw-tb-icon {
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, #FFD700, #f59e0b);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 18px rgba(255,215,0,0.28);
    transition: all .3s;
}
.flw-tb-icon svg { width:17px; height:17px; fill:none; stroke:#111; stroke-width:2.3; stroke-linecap:round; stroke-linejoin:round; }
.flw-tb-icon:hover {
    filter: brightness(1.08);
    transform: translateY(-1px);
}

/* ── Brand ── */
.flw-tb-brand {
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -.4px;
    display: flex;
    align-items: center;
    gap: 5px;
}
.flw-tb-brand span {
    background: linear-gradient(90deg, #f1f5f9 0%, rgba(255,215,0,.85) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* ── HC Counter badge ── */
.flw-hc-badge {
    display: flex;

/* ── AO VIVO pill ── */
.flw-status-pill {
    display: flex;
    align-items: center;
    gap: 5px;

    background: rgba(16,185,129,.07);

}

}
.flw-status-pill::before {
    content: '';

}

    content: '';

    inset: 0;

    background-size: 200% 100%;
    animation: live-sweep 3s linear infinite;
}
@keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(.75); }
}

    background: rgba(255,255,255,.018);

}
.abs-total-lbl {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: rgba(255,255,255,.32);
}
.abs-total-lbl svg { opacity: .55; }
.abs-total-val {
    font-size: 18px;
    font-weight: 900;
    color: rgba(255,255,255,.7);
    font-variant-numeric: tabular-nums;
    letter-spacing: -.01em;
}

/* Detalhes por status (modo área) */
.absenteismo-header { display: none; }
.absenteismo-escala { margin-bottom: 10px; }
.absenteismo-escala-nome {
    font-size: 9.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: rgba(255,255,255,.25);
    margin-bottom: 5px;
}
.absenteismo-status-item {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 12px;
    color: rgba(255,255,255,.55);
    border-bottom: 1px solid rgba(255,255,255,.04);
}
.absenteismo-status-nome { flex: 1; }
.absenteismo-status-count { font-weight: 700; color: rgba(255,255,255,.8); }

.abs-status-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; margin-top: 8px;
}
.abs-status-chip {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border-radius: 8px;
    font-size: 12px; border: 1px solid transparent;
}
.abs-status-chip.pres { background: rgba(74,222,128,.08);  border-color: rgba(74,222,128,.15); color: #4ade80; }
.abs-status-chip.falt { background: rgba(248,113,113,.08); border-color: rgba(248,113,113,.15); color: #f87171; }
.abs-status-chip.fold { background: rgba(129,140,248,.08); border-color: rgba(129,140,248,.15); color: #818cf8; }
.abs-status-chip.outr { background: rgba(148,163,184,.08); border-color: rgba(148,163,184,.12); color: #94a3b8; }
.abs-status-chip.pend { background: rgba(245,158,11,.08);  border-color: rgba(245,158,11,.15);  color: #fbbf24; }
.abs-status-chip strong { font-weight: 800; font-size: 15px; }

/* ─── Drill-down navigation ─────────────────────────────────── */
.flw-nav-heading {
    font-size: 0.72rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
    color: rgba(148,163,184,.55); margin-bottom: 4px; padding: 0 2px;
    display: flex; align-items: center; gap: 6px;
}
.flw-nav-heading svg { width:14px; height:14px; fill:none; stroke:rgba(255,215,0,.65); stroke-width:2; stroke-linecap:round; flex-shrink:0; }
.flw-nav-hint {
    font-size: 0.68rem; color: rgba(148,163,184,.28); margin-bottom: 16px;
    padding: 0 2px; letter-spacing: .02em;
}
.flw-breadcrumb {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px; flex-wrap: wrap;
}
.flw-bc-back {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 8px; cursor: pointer;
    font-size: 0.72rem; font-weight: 700;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09);
    color: rgba(148,163,184,.65); transition: all .18s; font-family: inherit;
}
.flw-bc-back svg { width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.flw-bc-back:hover { background: rgba(255,215,0,.1); border-color: rgba(255,215,0,.28); color: #FFD700; }
.flw-bc-sep { color: rgba(148,163,184,.22); font-size:.65rem; font-weight:600; }
.flw-bc-item {
    font-size: 0.72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: rgba(255,215,0,.7);
}
.flw-bc-item.bc-active { color: #FFD700; }

/* ─── Day KPI Row (inside detalhes) ─────────────────────────── */
.flw-day-kpi-row {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px; margin-bottom: 16px;
}
@media (max-width: 1100px) { .flw-day-kpi-row { grid-template-columns: repeat(3,1fr); } }
.flw-day-kpi {
    padding: 10px 12px; border-radius: 10px;
    border: 1px solid transparent; text-align: center;
    transition: transform .15s;
}
.flw-day-kpi:hover { transform: translateY(-1px); }
.flw-day-kpi.total { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
.flw-day-kpi.pres  { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
.flw-day-kpi.falt  { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
.flw-day-kpi.outr  { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
.flw-day-kpi.pend  { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
.flw-day-kpi-val {
    font-size: 20px; font-weight: 800; line-height: 1;
    font-variant-numeric: tabular-nums;
}
.flw-day-kpi.total .flw-day-kpi-val { color: #e2e8f0; }
.flw-day-kpi.pres  .flw-day-kpi-val { color: #e2e8f0; }
.flw-day-kpi.falt  .flw-day-kpi-val { color: #e2e8f0; }
.flw-day-kpi.outr  .flw-day-kpi-val { color: #e2e8f0; }
.flw-day-kpi.pend  .flw-day-kpi-val { color: #e2e8f0; }
.flw-day-kpi-lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.3); margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }

/* ─── Detalhes Search + Collapse Row ────────────────────────── */
.flw-search-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
}
.flw-detalhes-search {
    display: flex; align-items: center; gap: 8px; flex: 1;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 9px; padding: 7px 12px;
    transition: all .2s;
}
.flw-detalhes-search:focus-within {
    border-color: rgba(255,215,0,.3);
    background: rgba(255,215,0,.04);
}
.flw-detalhes-search svg { width: 13px; height: 13px; flex-shrink: 0; fill: none; stroke: rgba(255,255,255,.25); stroke-width: 2.2; stroke-linecap: round; }
.flw-detalhes-search:focus-within svg { stroke: rgba(255,215,0,.6); }
.flw-detalhes-search input {
    flex: 1; background: none; border: none; outline: none;
    color: #e2e8f0; font-size: 13px; font-family: inherit;
}
.flw-detalhes-search input::placeholder { color: rgba(255,255,255,.2); }
.flw-detalhes-search-count {
    font-size: 11px; font-weight: 600; color: rgba(255,215,0,.5);
    white-space: nowrap;
}

/* ─── Expand / Collapse All buttons ─────────────────────────── */
.flw-collapse-btns {
    display: flex; gap: 5px; flex-shrink: 0;
}
.flw-cbtn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 11px; border-radius: 8px; cursor: pointer;
    font-size: 11px; font-weight: 700; letter-spacing: .02em;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.04);
    color: rgba(255,255,255,.55);
    transition: all .18s; white-space: nowrap; font-family: inherit;
}
.flw-cbtn:hover {
    background: rgba(255,255,255,.08);
    border-color: rgba(255,255,255,.18);
    color: #e2e8f0;
}
.flw-cbtn svg {
    width: 12px; height: 12px; flex-shrink: 0; fill: none;
    stroke: currentColor; stroke-width: 2.2;
    stroke-linecap: round; stroke-linejoin: round;
}
.flw-cbtn.expand-btn:hover { border-color: rgba(255,215,0,.3); color: #FFD700; }
.flw-cbtn.collapse-btn:hover { border-color: rgba(148,163,184,.3); color: #94a3b8; }

/* ─── Gestor Row — Stat Chips (redesign) ────────────────────── */
.det-g-stats {
    display: flex; gap: 5px; flex-shrink: 0; align-items: center;
}
.det-g-stat {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 5px 10px; border-radius: 9px; min-width: 40px;
    transition: filter .15s;
}
.det-g-stat-val {
    font-size: 14px; font-weight: 800; line-height: 1;
}
.det-g-stat-lbl {
    font-size: 8.5px; font-weight: 700; margin-top: 2px;
    letter-spacing: .05em; text-transform: uppercase; opacity: .75;
}
.det-g-stat-p {
    background: rgba(74,222,128,.08);  color: #4ade80;
    border: 1px solid rgba(74,222,128,.18);
}
.det-g-stat-f {
    background: rgba(248,113,113,.08); color: #f87171;
    border: 1px solid rgba(248,113,113,.18);
}
.det-g-stat-o {
    background: rgba(129,140,248,.08); color: #818cf8;
    border: 1px solid rgba(129,140,248,.18);
}
.det-g-stat-n {
    background: rgba(245,158,11,.07);  color: #fbbf24;
    border: 1px solid rgba(245,158,11,.18);
}

/* ─── Mapa / Heatmap buttons — estilo idx-card (preto→ouro) ─── */
.btn-mapa-dark {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px 7px 11px; border-radius: 10px;
    background: rgba(15,23,42,.85);
    border: 1px solid rgba(255,255,255,.10);
    color: rgba(255,255,255,.5); font-size: 11px; font-weight: 700;
    letter-spacing: .45px; text-transform: uppercase;
    cursor: pointer; white-space: nowrap;
    transition: background .22s, border-color .22s, color .22s, box-shadow .22s, transform .2s;
}
.btn-mapa-dark svg {
    width: 13px; height: 13px; fill: none;
    stroke: rgba(255,255,255,.45);
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
    transition: stroke .22s, filter .22s;
}
/* arrow pill */
.btn-mapa-dark .bmd-arrow {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; color: rgba(255,255,255,.4); line-height: 1;
    transition: all .22s cubic-bezier(.34,1.56,.64,1);
    flex-shrink: 0;
}
/* hover — tudo ouro */
.btn-mapa-dark:hover {
    background: rgba(15,23,42,.97);
    border-color: rgba(255,215,0,.45);
    color: #FFD700;
    box-shadow: 0 0 18px rgba(255,215,0,.15);
    transform: translateY(-1px);
}
.btn-mapa-dark:hover svg {
    stroke: #FFD700;
    filter: drop-shadow(0 0 6px rgba(255,215,0,.7));
}
.btn-mapa-dark:hover .bmd-arrow {
    background: #FFD700;
    border-color: #FFD700;
    color: #000;
    box-shadow: 0 0 10px rgba(255,215,0,.45);
    transform: translateX(2px);
}
/* Heatmap — mesma base, sem variação própria */
.btn-heatmap { /* herda tudo de .btn-mapa-dark */ }

/* ─── Detalhes ───────────────────────────────────────────────── */
.detalhes-container {
    background: rgba(10,16,34,.97);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 14px;
    padding: 18px 20px;
    flex: 1;
    min-height: 400px;
}

.detalhes-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,.07);
}

.detalhes-titulo {
    font-size: 16px;
    font-weight: 700;
    color: rgba(255,255,255,.85);
}

.detalhes-data {
    font-size: 14px;
    font-weight: 700;
    color: #FFD700;
    background: rgba(255,215,0,.1);
    border: 1px solid rgba(255,215,0,.2);
    padding: 6px 14px;
    border-radius: 8px;
}

/* ─── Total HC Card ──────────────────────────────────────────── */
.total-hc-card {
    background: linear-gradient(135deg, rgba(255,215,0,.12) 0%, rgba(255,165,0,.08) 100%);
    border: 1px solid rgba(255,215,0,.2);
    color: white;
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
}

.total-hc-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% -20%, rgba(255,215,0,.08) 0%, transparent 70%);
    pointer-events: none;
}

.total-hc-numero {
    font-size: 48px;
    font-weight: 800;
    color: #FFD700;
    line-height: 1;
}

.total-hc-label {
    font-size: 13px;
    color: rgba(255,255,255,.5);
    margin-top: 6px;
}

/* ─── Empty State ────────────────────────────────────────────── */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 32px;
    min-height: 360px;
    position: relative;
    overflow: hidden;
}

/* Dot-grid background */
.empty-state::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(99,102,241,.05) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
}

/* Radial glow center */
.empty-state::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    width: 340px; height: 220px;
    background: radial-gradient(ellipse at center, rgba(99,102,241,.06) 0%, transparent 70%);
    pointer-events: none;
}

.es-icon-wrap {
    position: relative; z-index: 1;
    width: 64px; height: 64px;
    background: rgba(99,102,241,.08);
    border: 1px solid rgba(99,102,241,.22);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
    animation: es-pulse 3.5s ease-in-out infinite;
}
.es-icon-wrap svg {
    width: 26px; height: 26px;
    fill: none; stroke: rgba(129,140,248,.7);
    stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
}
@keyframes es-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    50%      { box-shadow: 0 0 20px 4px rgba(99,102,241,.1); border-color: rgba(99,102,241,.38); }
}

.es-title {
    position: relative; z-index: 1;
    font-size: 15px; font-weight: 800;
    color: rgba(226,232,240,.85);
    margin-bottom: 8px;
}

.es-sub {
    position: relative; z-index: 1;
    font-size: 12.5px; color: rgba(148,163,184,.5);
    line-height: 1.6; text-align: center; max-width: 280px;
    margin-bottom: 20px;
}

.es-action {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 8px; cursor: pointer;
    font-size: 12px; font-weight: 600;
    background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.28);
    color: #c7d2fe; transition: background .18s, border-color .18s;
}
.es-action:hover { background: rgba(99,102,241,.16); border-color: rgba(99,102,241,.42); }

/* ─── Skeleton Sweep Shimmer (LinkedIn / Notion style) ──────── */
.flw-skl-wrap { padding: 16px 0; overflow: hidden; }

/* Bloco de KPI skeleton no topo */
.flw-skl-kpi {
    display: flex; gap: 12px;
    padding: 16px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,.06);
}
.flw-skl-kpi-card {
    flex: 1; height: 68px; border-radius: 12px;
    background: rgba(255,255,255,.05);
    position: relative; overflow: hidden;
}
.flw-skl-kpi-card::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,.08) 50%, transparent 75%);
    background-size: 300% 100%;
    animation: flwSweep 1.6s ease-in-out infinite;
}
.flw-skl-kpi-card:nth-child(2)::after { animation-delay:.1s; }
.flw-skl-kpi-card:nth-child(3)::after { animation-delay:.2s; }
.flw-skl-kpi-card:nth-child(4)::after { animation-delay:.3s; }
.flw-skl-kpi-card:nth-child(5)::after { animation-delay:.4s; }

/* Linhas de cards (turnos) */
.flw-skl-heading {
    height: 12px; width: 140px; border-radius: 6px;
    background: rgba(255,255,255,.05);
    margin: 20px 20px 14px;
    position: relative; overflow: hidden;
}
.flw-skl-heading::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,.08) 50%, transparent 75%);
    background-size: 300% 100%;
    animation: flwSweep 1.6s ease-in-out infinite .15s;
}
.flw-skl-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px; padding: 0 20px;
}
.flw-skl-card {
    height: 88px; border-radius: 12px;
    background: rgba(255,255,255,.045);
    position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,.05);
}
.flw-skl-card::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,.07) 50%, transparent 75%);
    background-size: 300% 100%;
    animation: flwSweep 1.6s ease-in-out infinite;
}
.flw-skl-card:nth-child(2)::after { animation-delay:.07s; }
.flw-skl-card:nth-child(3)::after { animation-delay:.14s; }
.flw-skl-card:nth-child(4)::after { animation-delay:.21s; }
.flw-skl-card:nth-child(5)::after { animation-delay:.28s; }
.flw-skl-card:nth-child(6)::after { animation-delay:.35s; }

@keyframes flwSweep {
    0%   { background-position: 200% 0; }
    100% { background-position: -100% 0; }
}

/* ─── Registros: Turno Tab Bar ───────────────────────────────── */
.det-tab-bar {
    display: flex;
    gap: 5px;
    margin-bottom: 14px;
    background: rgba(10,16,34,.5);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 11px;
    padding: 4px;
    flex-wrap: wrap;
}
.det-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,.4);
    cursor: pointer;
    transition: all .2s;
    border: 1px solid transparent;
    user-select: none;
    white-space: nowrap;
    letter-spacing: .02em;
}
.det-tab:hover { color: rgba(255,255,255,.75); background: rgba(255,255,255,.06); }
.det-tab.active { background: rgba(255,215,0,.12); color: #FFD700; border-color: rgba(255,215,0,.25); }
.det-tab[data-turno="T1"].active  { background: rgba(99,102,241,.14);  color: #818cf8; border-color: rgba(99,102,241,.28);  }
.det-tab[data-turno="T2"].active  { background: rgba(56,189,248,.14);  color: #38bdf8; border-color: rgba(56,189,248,.28);  }
.det-tab[data-turno="T3"].active  { background: rgba(16,185,129,.14);  color: #34d399; border-color: rgba(16,185,129,.28);  }
.det-tab[data-turno="T4"].active  { background: rgba(245,158,11,.14);  color: #fbbf24; border-color: rgba(245,158,11,.28);  }
.det-tab[data-turno="ADM"].active { background: rgba(255,215,0,.12);   color: #FFD700; border-color: rgba(255,215,0,.25);   }
.det-tab-count { font-size: 11px; font-weight: 800; opacity: .75; }

/* ─── Registros: Area Block ──────────────────────────────────── */
.det-area-block {
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 12px;
    overflow: hidden;
    background: rgba(10,16,34,.3);
    transition: border-color .2s;
}
.det-area-block:hover { border-color: rgba(255,255,255,.11); }
.det-area-hdr {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    cursor: pointer;
    background: rgba(255,255,255,.03);
    transition: background .2s;
    user-select: none;
}
.det-area-hdr:hover { background: rgba(255,255,255,.07); }
.det-area-block.collapsed .det-area-hdr:hover { background: rgba(255,215,0,.05); }
/* Hint "toque para expandir" visível só quando colapsado */
.det-area-hint {
    font-size: 10px; color: rgba(255,255,255,.22); font-weight: 500;
    flex-shrink: 0; letter-spacing: .02em; white-space: nowrap;
}
.det-area-block:not(.collapsed) .det-area-hint { display: none; }
.det-area-chevron {
    width: 16px; height: 16px; flex-shrink: 0;
    color: rgba(255,255,255,.3);
    display: flex; align-items: center; justify-content: center;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.det-area-block.collapsed .det-area-chevron { transform: rotate(-90deg); }
.det-area-name {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,.85);
    flex: 1;
    letter-spacing: .015em;
}
.det-area-pills { display: flex; align-items: center; gap: 5px; }
.det-area-count {
    background: rgba(255,215,0,.1);
    color: #FFD700;
    border: 1px solid rgba(255,215,0,.18);
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 800;
    flex-shrink: 0;
}
.det-area-body {
    padding: 4px 12px 12px;
    display: block;
    animation: areaSlideIn .2s ease;
}
@keyframes areaSlideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
}
.det-area-block.collapsed .det-area-body { display: none; }

/* Progress bar */
.det-prog-wrap {
    height: 3px;
    background: rgba(255,255,255,.06);
    border-radius: 3px;
    margin: 6px 0 4px;
    overflow: hidden;
}
.det-prog-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .8s cubic-bezier(.4,0,.2,1);
}
.det-prog-fill.ok   { background: linear-gradient(90deg,#4ade80,#22d3ee); }
.det-prog-fill.warn { background: linear-gradient(90deg,#fbbf24,#f59e0b); }
.det-prog-fill.bad  { background: linear-gradient(90deg,#f87171,#ef4444); }
.det-prog-label {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,.25);
    text-align: right;
    margin-bottom: 8px;
    letter-spacing: .04em;
}

/* ─── Setor group label ───────────────────────────────────────── */
.det-setor-group { margin-top: 4px; }
.det-setor-lbl {
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,.22);
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 7px 4px 4px;
    border-top: 1px solid rgba(255,255,255,.04);
    margin-top: 4px;
}
.det-setor-group:first-child .det-setor-lbl { border-top: none; margin-top: 0; padding-top: 2px; }

/* ─── Gestor Row ─────────────────────────────────────────────── */
.det-gestor-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    margin-bottom: 3px;
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(255,255,255,.04);
    transition: background .15s, border-color .15s;
    cursor: default;
}
.det-gestor-row:hover {
    background: rgba(255,255,255,.05);
    border-color: rgba(255,255,255,.08);
}
.det-g-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,215,0,.1);
    border: 1px solid rgba(255,215,0,.2);
    color: #FFD700;
    font-size: 10px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    letter-spacing: .02em;
}
.det-g-info { flex: 1; min-width: 0; }
.det-g-name {
    font-size: 12px; font-weight: 700;
    color: rgba(255,255,255,.8);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.det-g-meta {
    font-size: 10px; color: rgba(255,255,255,.28);
    font-weight: 500; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
/* .det-g-pills deprecated — replaced by .det-g-stats in statusPills() */

/* ─── Loading overlay ────────────────────────────────────────── */
.header-loading {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,.5);
    font-size: 13px;
}

.loading-spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,215,0,.2);
    border-top-color: #FFD700;
    border-radius: 50%;
    animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Hamburger Button ───────────────────────────────────────── */
.menu-hamburger {
    display: flex !important;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    width: 48px !important;
    height: 48px !important;
    background: rgba(255,255,255,.07) !important;
    border: 1px solid rgba(255,255,255,.1) !important;
    border-radius: 10px !important;
    cursor: pointer;
    padding: 0 !important;
    transition: all .2s !important;
}

.menu-hamburger:hover {
    background: rgba(255,215,0,.12) !important;
    border-color: rgba(255,215,0,.25) !important;
}

.menu-hamburger span {
    display: block;
    width: 20px;
    height: 2.5px;
    background: rgba(255,255,255,.65) !important;
    border-radius: 2px;
    transition: all .3s !important;
}

.menu-hamburger.active span { background: #FFD700 !important; }

.menu-hamburger.active span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
}
.menu-hamburger.active span:nth-child(2) {
    opacity: 0;
}
.menu-hamburger.active span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
}

/* ─── Sidebar / Menu Lateral ─────────────────────────────────── */
.menu-lateral {
    position: fixed !important;
    top: 0 !important;
    left: -300px !important;
    width: 280px !important;
    height: 100vh !important;
    background: rgba(6,10,26,.98) !important;
    border-right: 1px solid rgba(255,255,255,.07) !important;
    backdrop-filter: blur(20px) !important;
    z-index: 1000 !important;
    transition: left .3s cubic-bezier(.4,0,.2,1) !important;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.menu-lateral.active {
    left: 0 !important;
    box-shadow: 8px 0 40px rgba(0,0,0,.6), 0 0 0 1px rgba(255,215,0,.04) !important;
}

.menu-overlay {
    position: fixed !important;
    inset: 0 !important;
    background: rgba(0,0,0,.6) !important;
    backdrop-filter: blur(2px) !important;
    z-index: 999 !important;
    display: none !important;
    opacity: 0;
    transition: opacity .3s !important;
}

.menu-overlay.active {
    display: block !important;
    opacity: 1;
}

.menu-header {
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    padding: 18px 20px !important;
    background: rgba(255,215,0,.04) !important;
    border-bottom: 1px solid rgba(255,255,255,.06) !important;
    min-height: 64px;
    flex-shrink: 0;
}

.menu-logo svg path { fill: #ffffff !important; }

.menu-fechar {
    width: 32px !important;
    height: 32px !important;
    background: rgba(255,255,255,.07) !important;
    border: 1px solid rgba(255,255,255,.1) !important;
    border-radius: 8px !important;
    color: rgba(255,255,255,.6) !important;
    font-size: 18px !important;
    line-height: 1 !important;
    cursor: pointer !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    transition: all .2s !important;
    padding: 0 !important;
}

.menu-fechar:hover {
    background: rgba(239,68,68,.15) !important;
    border-color: rgba(239,68,68,.3) !important;
    color: #f87171 !important;
}

.menu-nav {
    flex: 1;
    overflow-y: auto;
    padding: 10px 10px !important;
    display: flex !important;
    flex-direction: column !important;
    gap: 2px !important;
}

.menu-nav::-webkit-scrollbar { width: 4px; }
.menu-nav::-webkit-scrollbar-track { background: transparent; }
.menu-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.sidebar-menu-item {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
    padding: 11px 14px !important;
    border-radius: 10px !important;
    text-decoration: none !important;
    color: rgba(255,255,255,.6) !important;
    font-size: 13px !important;
    font-weight: 500 !important;
    transition: all .18s !important;
    position: relative;
    background: transparent !important;
    border: 1px solid transparent !important;
}

.sidebar-menu-item:hover {
    background: rgba(255,215,0,.07) !important;
    border-color: rgba(255,215,0,.12) !important;
    color: rgba(255,255,255,.9) !important;
}

.sidebar-menu-item:hover .sidebar-menu-icon {
    transform: scale(1.15);
}

.sidebar-menu-item[href*="flow"] {
    background: rgba(255,215,0,.1) !important;
    border-color: rgba(255,215,0,.2) !important;
    color: #FFD700 !important;
}

.sidebar-menu-icon {
    font-size: 16px !important;
    width: 24px !important;
    text-align: center !important;
    flex-shrink: 0;
    transition: transform .18s;
}

.sidebar-menu-text {
    flex: 1 !important;
    line-height: 1.3 !important;
}

.sidebar-menu-subtitle {
    display: block !important;
    font-size: 10px !important;
    color: rgba(255,255,255,.3) !important;
    margin-top: 1px !important;
    font-weight: 400 !important;
}

/* ─── Nav sections (igual ao index) ─────────────────────────── */
.flw-nav-section { padding: 14px 10px 4px; }

.flw-nav-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    padding: 0 10px;
    margin-bottom: 6px;
}

.flw-nav-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,.07);
}

.flw-nav-label.op { color: rgba(255,215,0,.8); }
.flw-nav-label.ge { color: rgba(56,189,248,.8); }
.flw-nav-label.ad { color: rgba(251,113,133,.8); }

.flw-nav-item {
    display: flex !important;
    align-items: center !important;
    gap: 11px !important;
    padding: 9px 10px !important;
    border-radius: 10px !important;
    cursor: pointer !important;
    color: rgba(255,255,255,.82) !important;
    font-size: 13.5px !important;
    font-weight: 600 !important;
    text-decoration: none !important;
    transition: all .18s !important;
    position: relative;
    margin-bottom: 2px;
    border: none !important;
    background: transparent !important;
    width: 100%;
}

.flw-nav-item:hover {
    background: rgba(255,255,255,.09) !important;
    color: #fff !important;
}

.flw-nav-item:hover .flw-nav-ico { transform: scale(1.12) rotate(-4deg); }

.flw-nav-item.active {
    background: rgba(255,215,0,.14) !important;
    color: #FFD700 !important;
    font-weight: 700 !important;
}

.flw-nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 18%; bottom: 18%;
    width: 3px;
    background: linear-gradient(180deg,#FFD700,#f59e0b);
    border-radius: 0 3px 3px 0;
}

.flw-nav-ico {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .22s cubic-bezier(.34,1.56,.64,1), background .18s;
}

/* Todos os grupos — estilo neutro uniforme */
.flw-nav-item.op .flw-nav-ico,
.flw-nav-item.ge .flw-nav-ico,
.flw-nav-item.ad .flw-nav-ico { background: rgba(255,255,255,.06); }

.flw-nav-item.op:hover .flw-nav-ico,
.flw-nav-item.op.active .flw-nav-ico,
.flw-nav-item.ge:hover .flw-nav-ico,
.flw-nav-item.ge.active .flw-nav-ico,
.flw-nav-item.ad:hover .flw-nav-ico,
.flw-nav-item.ad.active .flw-nav-ico { background: rgba(255,215,0,.15); }

.flw-nav-ico svg {
    width: 15px; height: 15px;
    fill: none;
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke .18s, filter .18s;
}

.flw-nav-item.op .flw-nav-ico svg,
.flw-nav-item.ge .flw-nav-ico svg,
.flw-nav-item.ad .flw-nav-ico svg { stroke: rgba(255,255,255,.45); }

.flw-nav-item.op:hover .flw-nav-ico svg,
.flw-nav-item.op.active .flw-nav-ico svg,
.flw-nav-item.ge:hover .flw-nav-ico svg,
.flw-nav-item.ge.active .flw-nav-ico svg,
.flw-nav-item.ad:hover .flw-nav-ico svg,
.flw-nav-item.ad.active .flw-nav-ico svg { stroke: #FFD700; filter: drop-shadow(0 0 4px rgba(255,215,0,.5)); }

.flw-nav-divider {
    height: 1px;
    background: rgba(255,255,255,.05);
    margin: 6px 20px;
}

.flw-sidebar-footer {
    padding: 14px 16px;
    border-top: 1px solid rgba(255,255,255,.06);
    margin-top: auto;
}

.flw-user-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 10px;
}

.flw-user-dot {
    width: 8px; height: 8px;
    background: #10b981;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 7px rgba(16,185,129,.8);
    animation: pulse-dot 2.2s ease-in-out infinite;
}

.flw-user-info {
    flex: 1;
    min-width: 0;
}

.flw-user-name {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.flw-user-role {
    font-size: 10px;
    color: rgba(255,255,255,.3);
    margin-top: 1px;
}

/* ═══════════════════════════════════════════════════
   MELHORIAS V2 — KPI, TABS, ÁREA, GESTOR
   ═══════════════════════════════════════════════════ */

/* ── KPI Cards v2 ─────────────────────────────────── */
.flw-day-kpi {
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: flex-start;
    padding: 12px 14px 10px; gap: 2px;
}
.flw-day-kpi::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    border-radius: 10px 10px 0 0;
}
.flw-day-kpi.total::before { background: linear-gradient(90deg,rgba(255,255,255,.15),transparent); }
.flw-day-kpi.pres::before  { background: linear-gradient(90deg,rgba(255,255,255,.15),transparent); }
.flw-day-kpi.falt::before  { background: linear-gradient(90deg,rgba(255,255,255,.15),transparent); }
.flw-day-kpi.outr::before  { background: linear-gradient(90deg,rgba(255,255,255,.15),transparent); }
.flw-day-kpi.pend::before  { background: linear-gradient(90deg,rgba(255,255,255,.15),transparent); }
.flw-day-kpi-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 6px; flex-shrink: 0;
}
.flw-day-kpi-icon svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.flw-day-kpi.total .flw-day-kpi-icon { background: rgba(255,255,255,.07); color: #94a3b8; }
.flw-day-kpi.pres  .flw-day-kpi-icon { background: rgba(255,255,255,.07); color: #94a3b8; }
.flw-day-kpi.falt  .flw-day-kpi-icon { background: rgba(255,255,255,.07); color: #94a3b8; }
.flw-day-kpi.outr  .flw-day-kpi-icon { background: rgba(255,255,255,.07); color: #94a3b8; }
.flw-day-kpi.pend  .flw-day-kpi-icon { background: rgba(255,255,255,.07); color: #94a3b8; }
.flw-day-kpi-val { font-size: 22px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
.flw-day-kpi-lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: .05em; margin-top: 1px; }
.flw-day-kpi-sub { font-size: 10px; font-weight: 600; color: rgba(255,255,255,.2); margin-top: 3px; }

/* ── Turno / Área Cards — largo, estilo chamada ────────── */
.flw-turno-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-bottom: 20px;
}
@media (max-width: 920px) { .flw-turno-grid { grid-template-columns: repeat(2,1fr); gap:16px; } }
@media (max-width: 560px) { .flw-turno-grid { grid-template-columns: 1fr; gap:12px; } }

.flw-turno-card {
    background: rgba(10,16,34,.97);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 16px;
    padding: 20px 22px 18px;
    min-height: 0;
    cursor: pointer; position: relative; overflow: hidden;
    transition: transform .2s, box-shadow .25s, border-color .22s, background .22s;
    display: flex; flex-direction: column; gap: 12px;
    user-select: none;
}
/* Top bar: oculta por padrão, só aparece no hover */
.flw-turno-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #FFD700, rgba(255,215,0,.25));
    opacity: 0; transition: opacity .22s; z-index:1;
}
/* Glow sutil no hover */
.flw-turno-card::after {
    content:''; position:absolute; inset:0; border-radius:22px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,215,0,.05) 0%, transparent 70%);
    opacity:0; transition:opacity .3s; pointer-events:none;
}
.flw-turno-card:hover::before  { opacity: 1; }
.flw-turno-card:hover::after   { opacity: 1; }
.flw-turno-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,.55), 0 0 0 1px rgba(255,215,0,0.22);
    border-color: rgba(255,215,0,.28);
}
.flw-tc-top { display: flex; align-items: center; justify-content: space-between; }
.flw-tc-badge {
    font-size: 1.6rem; font-weight: 900; color: rgba(255,255,255,.85);
    letter-spacing: -.03em; line-height: 1;
    transition: color .2s;
}
.flw-turno-card:hover .flw-tc-badge { color: #FFD700; }
.flw-tc-arrow {
    width: 22px; height: 22px; fill: none;
    stroke: rgba(255,255,255,.2); stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
    transition: stroke .2s, transform .2s;
}
.flw-turno-card:hover .flw-tc-arrow { stroke: #FFD700; transform: translateX(3px); }

/* Linha de avatares dos gestores */
.flw-tc-gest-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.flw-tc-gest-av {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.58rem; font-weight: 800; flex-shrink: 0;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14);
    color: rgba(148,163,184,.8); transition: background .2s, border-color .2s;
}
.flw-tc-gest-more {
    background: rgba(255,255,255,.05) !important;
    border-color: rgba(255,255,255,.1) !important;
    color: rgba(148,163,184,.5) !important; font-size:.58rem;
}
.flw-turno-card:hover .flw-tc-gest-av { background: rgba(255,215,0,.08); border-color: rgba(255,215,0,.22); }

.flw-tc-meta { font-size: 0.72rem; font-weight: 500; color: rgba(148,163,184,.45); }
.flw-tc-bar-wrap { height: 4px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden; }
.flw-tc-bar {
    height: 100%; border-radius: 4px;
    background: rgba(255,255,255,.12);
    transition: background .22s, width .5s cubic-bezier(.4,0,.2,1);
}
.flw-turno-card:hover .flw-tc-bar {
    background: linear-gradient(90deg, #FFD700, rgba(255,215,0,.38));
}
.flw-tc-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,.7);
    animation: flwPendPulse 2s ease-in-out infinite;
}
.flw-tc-dot-ok { background: #10b981; box-shadow: none; animation: none; }
@keyframes flwPendPulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.4; transform:scale(1.4); }
}

/* ── Pendentes por Turno — read-only summary panel ─────────── */
.flw-pend-section {
    margin-bottom: 20px;
    background: rgba(15,23,42,.85);
    border: 1px solid rgba(255,215,0,.12);
    border-radius: 16px; padding: 18px 20px 16px;
}
.flw-pend-section-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
}
.flw-pend-section-title {
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,.4);
    text-transform: uppercase; letter-spacing: .08em;
    display: flex; align-items: center; gap: 8px;
}
.flw-pend-dot-anim {
    width: 7px; height: 7px; border-radius: 50%;
    background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,.7);
    animation: flwPendPulse 2s ease-in-out infinite; flex-shrink: 0;
}
.flw-pend-section-count {
    font-size: 13px; font-weight: 800; color: #f59e0b;
}
.flw-pend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
}
.flw-pend-card {
    background: rgba(22,34,65,.95);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 13px; padding: 15px 14px 13px;
    position: relative; overflow: hidden;
    transition: border-color .2s, transform .18s;
}
.flw-pend-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--tc,#FFD700), transparent);
}
.flw-pend-card-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 9px;
}
.flw-pend-card-badge {
    font-size: 1.6rem; font-weight: 900;
    color: var(--tc,#FFD700); letter-spacing: -.03em; line-height: 1;
}
.flw-pend-card-cnt {
    font-size: 1.55rem; font-weight: 900;
    color: #f59e0b; line-height: 1; text-align: right;
}
.flw-pend-card-cnt-lbl {
    display: block; font-size: 9px; font-weight: 700;
    color: rgba(245,158,11,.5); text-transform: uppercase; letter-spacing: .06em;
    margin-top: 2px;
}
.flw-pend-card-meta {
    font-size: 10px; font-weight: 600;
    color: rgba(148,163,184,.4); margin: 6px 0 5px;
}

/* ── Area Block v2 — acento de urgência ──────────────── */
.det-area-block {
    border-left: 3px solid transparent;
    transition: border-color .3s, box-shadow .2s;
}
.det-area-block.ab-ok   { border-left-color: rgba(74,222,128,.4); }
.det-area-block.ab-warn { border-left-color: rgba(251,191,36,.35); }
.det-area-block.ab-bad  { border-left-color: rgba(248,113,113,.4); }
.det-area-block.ab-bad:hover  { box-shadow: inset 3px 0 0 0 rgba(248,113,113,.6); }
.det-area-block.ab-ok:hover   { box-shadow: inset 3px 0 0 0 rgba(74,222,128,.5); }

/* Presença % inline no header */
.det-area-pct {
    font-size: 10px; font-weight: 800;
    padding: 1px 7px; border-radius: 6px;
    white-space: nowrap; flex-shrink: 0;
}
.det-area-block.ab-ok   .det-area-pct { color: #4ade80; background: rgba(74,222,128,.1);  }
.det-area-block.ab-warn .det-area-pct { color: #fbbf24; background: rgba(245,158,11,.1);  }
.det-area-block.ab-bad  .det-area-pct { color: #f87171; background: rgba(248,113,113,.1); }

/* ── Gestor Row v2 ───────────────────────────────────── */
.det-gestor-row {
    position: relative; overflow: hidden;
}
/* Barra de fundo (completion bar) */
.det-gestor-row::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: var(--pct, 0%); max-width: 100%;
    background: rgba(74,222,128,.04);
    transition: width .6s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
}
.det-g-pct-ring {
    width: 46px; height: 46px; flex-shrink: 0; position: relative; margin-left: 4px;
}
.det-g-pct-ring svg { width: 46px; height: 46px; transform: rotate(-90deg); }
.det-g-pct-ring circle { fill: none; stroke-width: 3.2; stroke-linecap: round; }
.det-g-pct-ring .ring-bg   { stroke: rgba(255,255,255,.07); }
.det-g-pct-ring .ring-fill { transition: stroke-dasharray .6s cubic-bezier(.4,0,.2,1); }
.det-g-pct-text {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1px; pointer-events: none;
}
.det-g-pct-num {
    font-size: 10.5px; font-weight: 800; color: rgba(255,255,255,.8); line-height: 1;
}
.det-g-pct-sub {
    font-size: 7px; font-weight: 700; color: rgba(255,255,255,.3);
    letter-spacing: .04em; text-transform: uppercase; line-height: 1;
}
/* Classe de urgência no avatar */
.det-g-avatar.av-ok   { background: rgba(74,222,128,.12);  border-color: rgba(74,222,128,.25);  color: #4ade80; }
.det-g-avatar.av-warn { background: rgba(245,158,11,.1);   border-color: rgba(245,158,11,.22);  color: #fbbf24; }
.det-g-avatar.av-bad  { background: rgba(248,113,113,.12); border-color: rgba(248,113,113,.25); color: #f87171; }

/* ── Header "Registros do Dia" v2 ────────────────────── */
.detalhes-titulo {
    font-size: 15px; font-weight: 800;
    background: linear-gradient(90deg, #f1f5f9, rgba(255,215,0,.7));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
}
.detalhes-data {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px;
}

/* ── Coluna Pendentes ────────────────────────────────────── */
.flw-rt-pend-cell {
    padding: 10px 10px 8px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,.04);
    border-left: 1px solid rgba(255,255,255,.06);
    white-space: nowrap; font-variant-numeric: tabular-nums;
    vertical-align: middle; min-width: 72px;
    background: rgba(255,255,255,.015);
}
.flw-rt-pend-cell strong {
    font-size: 16px; font-weight: 800; color: #e2e8f0; display: block; line-height: 1;
}
.flw-rt-pend-cell .flw-rt-cell-meta { font-size: 9px; color: rgba(255,255,255,.2); font-weight: 600; }
.flw-rt-pend-cell.pend-zero strong { color: rgba(148,163,184,.5); font-size: 13px; }

/* ── Legenda de cores ────────────────────────────────────── */
.flw-rt-legend {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 7px 16px 9px;
    border-top: 1px solid rgba(255,255,255,.05);
    background: rgba(255,255,255,.015);
}
.flw-rt-legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: rgba(255,255,255,.35); font-weight: 600;
}
.flw-rt-legend-dot {
    width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0;
}
.flw-rt-legend-label { color: rgba(255,255,255,.55); font-size: 9px; }

/* ── Timestamp no header ─────────────────────────────────── */
.flw-resumo-ts {
    font-size: 9.5px; color: rgba(255,255,255,.2); font-weight: 500;
    letter-spacing: .02em; margin-left: 8px;
}

/* ── Turno crítico — linha destacada ─────────────────────── */
tr.flw-rt-critico .flw-rt-turno-inner {
    background: rgba(255,255,255,.025);
}

/* ── Turno/Área card: presença badge no topo ─────────────── */
.flw-tc-pres-badge {
    font-size: 1.05rem;
    font-weight: 800;
    color: #e2e8f0;
    font-variant-numeric: tabular-nums;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px;
    padding: 2px 9px;
    line-height: 1.4;
    flex-shrink: 0;
    display: flex; align-items: baseline; gap: 1px;
}
.flw-tc-pres-badge span {
    font-size: .65em;
    opacity: .55;
    font-weight: 700;
}

/* ── Area/Setor pills dentro dos cards ──────────────────── */
.flw-tc-area-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 2px;
}
.flw-tc-area-pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 6px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.08);
    color: rgba(148,163,184,.65);
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: .01em;
}
.flw-tc-area-pill strong {
    color: rgba(255,255,255,.82);
    font-weight: 800;
}
.flw-tc-setor-pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 6px;
    background: rgba(99,102,241,.07);
    border: 1px solid rgba(99,102,241,.14);
    color: rgba(148,163,184,.6);
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: .01em;
}
.flw-tc-setor-pill strong {
    color: rgba(129,140,248,.9);
    font-weight: 800;
}

/* ── Resumo Panel (tabela HC × Turno × Área) ────────────── */
.flw-resumo-panel {
    background: rgba(10,16,34,.97);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
}
.flw-resumo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(255,255,255,.03);
    border-bottom: 1px solid rgba(255,255,255,.06);
    cursor: pointer;
    user-select: none;
}
.flw-resumo-header-left {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,.55); letter-spacing: .06em; text-transform: uppercase;
}
.flw-resumo-header svg {
    width: 13px; height: 13px;
    fill: none; stroke: rgba(255,255,255,.35);
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
}
.flw-resumo-toggle {
    font-size: 10px; font-weight: 600;
    color: rgba(148,163,184,.4); letter-spacing: .04em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 4px;
}
.flw-resumo-toggle svg {
    width: 12px; height: 12px;
    stroke: rgba(148,163,184,.4); stroke-width: 2.2;
    transition: transform .25s;
}
.flw-resumo-panel.collapsed .flw-resumo-toggle svg { transform: rotate(-90deg); }
.flw-resumo-body { overflow-x: auto; }
.flw-resumo-panel.collapsed .flw-resumo-body { display: none; }

.flw-resumo-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

/* ── Cabeçalho da tabela ─── */
.flw-resumo-table thead th {
    padding: 10px 12px 10px;
    text-align: center;
    font-size: 10px; font-weight: 800;
    color: rgba(255,255,255,.35);
    letter-spacing: .08em; text-transform: uppercase;
    border-bottom: 1px solid rgba(255,255,255,.07);
    white-space: nowrap;
    background: rgba(255,255,255,.02);
}
.flw-resumo-table thead th:first-child {
    text-align: left; padding-left: 20px; width: 110px;
}
.flw-resumo-table thead th:last-child {
    border-left: 1px solid rgba(255,255,255,.07);
    color: rgba(148,163,184,.55);
}
/* Badge HC no cabeçalho de área */
.flw-rt-th-area { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.flw-rt-th-name { font-size: 10px; font-weight: 800; letter-spacing: .08em; }
.flw-rt-th-hc {
    font-size: 9px; font-weight: 700;
    color: rgba(255,255,255,.2);
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 4px; padding: 1px 5px;
    letter-spacing: .04em; text-transform: none;
}

/* ── Coluna Turno ─── */
.flw-rt-turno {
    padding: 0 16px 0 0;
    white-space: nowrap;
    border-bottom: 1px solid rgba(255,255,255,.04);
    vertical-align: middle;
}
.flw-rt-turno-inner {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px 12px 16px;
    border-left: 3px solid transparent;
}
/* Cor por turno */
tr[data-turno="T1"] .flw-rt-turno-inner { border-left-color: rgba(99,102,241,.7); }
tr[data-turno="T2"] .flw-rt-turno-inner { border-left-color: rgba(56,189,248,.7);  }
tr[data-turno="T3"] .flw-rt-turno-inner { border-left-color: rgba(16,185,129,.7);  }
tr[data-turno="T4"] .flw-rt-turno-inner { border-left-color: rgba(245,158,11,.7);  }
tr[data-turno="ADM"] .flw-rt-turno-inner{ border-left-color: rgba(255,215,0,.7);   }
tr[data-turno="SEM"] .flw-rt-turno-inner{ border-left-color: rgba(148,163,184,.4); }
.flw-rt-turno-label {
    font-size: 13px; font-weight: 800; color: rgba(255,255,255,.82);
    line-height: 1;
}
.flw-rt-turno-sub { font-size: 9px; color: rgba(255,255,255,.28); font-weight: 500; margin-top: 2px; }

/* Cor do label por turno */
tr[data-turno="T1"] .flw-rt-turno-label { color: rgba(255,255,255,.82); }
tr[data-turno="T2"] .flw-rt-turno-label { color: rgba(255,255,255,.82); }
tr[data-turno="T3"] .flw-rt-turno-label { color: rgba(255,255,255,.82); }
tr[data-turno="T4"] .flw-rt-turno-label { color: rgba(255,255,255,.82); }
tr[data-turno="ADM"] .flw-rt-turno-label{ color: rgba(255,255,255,.82); }

/* ── Célula de dados ─── */
.flw-rt-cell {
    padding: 10px 12px 8px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,.04);
    border-left: 1px solid rgba(255,255,255,.04);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    vertical-align: middle;
    min-width: 90px;
}
.flw-rt-cell-inner { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.flw-rt-cell strong {
    font-size: 18px; font-weight: 800;
    line-height: 1; display: block;
}
.flw-rt-cell-meta {
    font-size: 9.5px; color: rgba(255,255,255,.3);
    font-weight: 600; letter-spacing: .02em;
}
.flw-rt-cell-pct {
    font-size: 9px; font-weight: 800;
    padding: 1px 5px; border-radius: 4px; margin-top: 2px;
    letter-spacing: .03em;
}
/* Mini barra de progresso na célula */
.flw-rt-mini-bar {
    width: 100%; height: 3px;
    background: rgba(255,255,255,.06);
    border-radius: 3px; overflow: hidden;
    margin-top: 5px;
}
.flw-rt-mini-fill {
    height: 100%; border-radius: 3px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
}
/* Classes semânticas */
.flw-rt-cell.rt-ok   strong { color: #e2e8f0; }
.flw-rt-cell.rt-ok   .flw-rt-cell-pct { color: rgba(148,163,184,.7); background: rgba(255,255,255,.06); }
.flw-rt-cell.rt-ok   .flw-rt-mini-fill { background: linear-gradient(90deg,rgba(148,163,184,.4),rgba(148,163,184,.2)); }
.flw-rt-cell.rt-warn strong { color: #e2e8f0; }
.flw-rt-cell.rt-warn .flw-rt-cell-pct { color: rgba(148,163,184,.7); background: rgba(255,255,255,.06); }
.flw-rt-cell.rt-warn .flw-rt-mini-fill { background: linear-gradient(90deg,rgba(148,163,184,.4),rgba(148,163,184,.2)); }
.flw-rt-cell.rt-bad  strong { color: #e2e8f0; }
.flw-rt-cell.rt-bad  .flw-rt-cell-pct { color: rgba(148,163,184,.7); background: rgba(255,255,255,.06); }
.flw-rt-cell.rt-bad  .flw-rt-mini-fill { background: linear-gradient(90deg,rgba(148,163,184,.4),rgba(148,163,184,.2)); }
.flw-rt-cell.rt-empty {
    color: rgba(255,255,255,.1); font-size: 16px;
    vertical-align: middle;
}

/* ── Coluna Total ─── */
.flw-rt-total {
    padding: 10px 14px 8px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,.04);
    border-left: 1px solid rgba(255,255,255,.07);
    font-variant-numeric: tabular-nums;
    vertical-align: middle; min-width: 100px;
    background: rgba(255,255,255,.02);
}
.flw-rt-total strong { font-size: 18px; font-weight: 800; color: #e2e8f0; display: block; line-height: 1; }
.flw-rt-total-meta { font-size: 9.5px; color: rgba(148,163,184,.4); font-weight: 600; margin-top: 1px; }
.flw-rt-total-pct {
    font-size: 9px; font-weight: 800;
    padding: 1px 5px; border-radius: 4px; margin-top: 2px; display: inline-block;
}
.flw-rt-mini-bar-gold {
    width: 100%; height: 3px;
    background: rgba(255,255,255,.06);
    border-radius: 3px; overflow: hidden; margin-top: 5px;
}
.flw-rt-mini-fill-gold {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg,rgba(148,163,184,.4),rgba(148,163,184,.2));
    transition: width .6s cubic-bezier(.4,0,.2,1);
}

/* ── Linha de rodapé (totais por área) ─── */
.flw-rt-footer td, .flw-rt-footer th {
    border-top: 1px solid rgba(255,255,255,.08) !important;
    border-bottom: none !important;
    background: rgba(255,255,255,.03) !important;
    padding-top: 11px !important; padding-bottom: 11px !important;
}
.flw-rt-footer .flw-rt-turno-inner {
    border-left-color: rgba(255,255,255,.2) !important;
}
.flw-rt-footer .flw-rt-turno-label {
    color: rgba(255,255,255,.5) !important;
    font-size: 10px !important; letter-spacing: .08em;
}
.flw-rt-footer .flw-rt-cell strong { font-size: 15px !important; }
.flw-rt-footer .flw-rt-total { background: rgba(255,255,255,.025) !important; }

/* Hover na linha */
.flw-resumo-table tbody tr:not(.flw-rt-footer):hover .flw-rt-turno,
.flw-resumo-table tbody tr:not(.flw-rt-footer):hover .flw-rt-cell,
.flw-resumo-table tbody tr:not(.flw-rt-footer):hover .flw-rt-total {
    background: rgba(255,255,255,.03);
}
.flw-resumo-table tbody tr:last-child td,
.flw-resumo-table tbody tr:last-child th { border-bottom: none; }

/* ─── HC Previsto por Escala Panel ─────────────────────────────────────── */
.flw-escala-panel {
    background: rgba(10,16,34,.97);
    border: 1px solid rgba(139,92,246,.12);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
}
.flw-escala-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px; cursor: pointer; user-select: none;
    border-bottom: 1px solid rgba(139,92,246,.08);
    background: rgba(139,92,246,.04);
    transition: background .2s;
}
.flw-escala-header:hover { background: rgba(139,92,246,.07); }
.flw-escala-header-left {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; color: rgba(139,92,246,.8);
    letter-spacing: .04em; text-transform: uppercase;
}
.flw-escala-header svg {
    width: 13px; height: 13px; fill: none; stroke: rgba(139,92,246,.7);
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
.flw-escala-toggle {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: rgba(139,92,246,.5); font-weight: 600;
}
.flw-escala-toggle svg {
    width: 12px; height: 12px; fill: none; stroke: rgba(139,92,246,.5);
    stroke-width: 2.2; stroke-linecap: round; transition: transform .25s;
}
.flw-escala-panel.collapsed .flw-escala-toggle svg { transform: rotate(-90deg); }
.flw-escala-body { padding: 14px 18px; }
.flw-escala-panel.collapsed .flw-escala-body { display: none; }
.flw-escala-kpi-row {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 14px;
}
@media (max-width: 1000px) { .flw-escala-kpi-row { grid-template-columns: repeat(3,1fr); } }
@media (max-width: 640px)  { .flw-escala-kpi-row { grid-template-columns: repeat(2,1fr); } }
.flw-falta-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 6px; border: 1px solid rgba(251,191,36,.35);
    background: rgba(251,191,36,.08); color: #fbbf24; font-size: 16px; font-weight: 700;
    cursor: pointer; line-height: 1; transition: all .15s; flex-shrink: 0;
}
.flw-falta-btn:hover { background: rgba(251,191,36,.18); border-color: rgba(251,191,36,.6); }
.flw-escala-kpi {
    background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
    border-radius: 10px; padding: 11px 12px; transition: all .2s;
}
.flw-escala-kpi:hover { background: rgba(139,92,246,.06); border-color: rgba(139,92,246,.15); }
.flw-escala-kpi-val {
    font-size: 21px; font-weight: 800; color: #e2e8f0;
    font-variant-numeric: tabular-nums; line-height: 1.1;
}
.flw-escala-kpi-lbl {
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,.38);
    letter-spacing: .05em; text-transform: uppercase; margin-top: 3px;
}
.flw-escala-kpi-sub { font-size: 10px; color: rgba(255,255,255,.22); margin-top: 2px; }
.kpi-mes  .flw-escala-kpi-val { color: #94a3b8; }
.kpi-prev .flw-escala-kpi-val { color: #e2e8f0; }
.kpi-folga .flw-escala-kpi-val { color: #64748b; }
.kpi-efet .flw-escala-kpi-val { color: #e2e8f0; }
.flw-escala-table-wrap { overflow-x: auto; margin-bottom: 10px; }
.flw-escala-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.flw-escala-table thead th {
    padding: 7px 10px; text-align: left; white-space: nowrap;
    font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: rgba(255,255,255,.28); border-bottom: 1px solid rgba(255,255,255,.06);
}
.flw-escala-table tbody td {
    padding: 7px 10px; color: rgba(255,255,255,.65);
    border-bottom: 1px solid rgba(255,255,255,.04);
    font-variant-numeric: tabular-nums;
}
.flw-escala-table tbody tr:last-child td { border-bottom: none; }
.flw-escala-row-off td { opacity: .4; }
.flw-escala-turno-tag {
    display: inline-block; padding: 2px 8px; border-radius: 5px;
    font-size: 11px; font-weight: 700; border: 1px solid;
}
.flw-escala-pct-mes { font-size: 10px; color: rgba(255,255,255,.25); margin-left: 4px; }
.flw-escala-off-txt { color: rgba(255,255,255,.22); font-style: italic; font-size: 11px; }
.flw-escala-falt-cnt { color: #e2e8f0; font-weight: 700; }
.flw-escala-st { font-size: 10px; font-weight: 700; letter-spacing: .04em; }
.flw-escala-st.ativo { color: rgba(148,163,184,.6); }
.flw-escala-st.folga { color: rgba(148,163,184,.3); }
.flw-escala-efet-val { color: #e2e8f0; font-weight: 700; }
.flw-escala-nota {
    display: flex; align-items: flex-start; gap: 6px;
    font-size: 10.5px; color: rgba(255,255,255,.28); padding: 8px 0;
    border-top: 1px solid rgba(255,255,255,.05); line-height: 1.5;
}
.flw-escala-nota svg { margin-top: 1px; flex-shrink: 0; }

<script>
    const SCRIPT_URL = '<?= scriptUrl ?>';

    // ── Formatação de número com separador de milhar (pt-BR) ─────────────────
    const fmt = n => (n == null || n === '' ? '—' : Number(n).toLocaleString('pt-BR'));

    function navegar(pagina) {
        window.top.location.href = SCRIPT_URL + '?page=' + pagina;
    }

    function navegarHeatmap() {
        // Usa hash para passar parâmetro sem recarregar — GAS lê via google.script.url.getLocation
        window.top.location.href = SCRIPT_URL + '?page=historico#openHeatmap=1';
    }

    // Live clock
    (function() {
        function tick() {
            const el = document.getElementById('flwClock');
            if (!el) return;
            const now = new Date();
            const pad = n => String(n).padStart(2,'0');
            el.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
        }
        tick();
        setInterval(tick, 1000);
    })();

    window.addEventListener('error', function(e) {
        console.error('Erro JavaScript:', e.error);
        document.getElementById('detalhesContainer').innerHTML =
            '<div style="text-align:center;padding:40px;color:#f87171;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:12px;"><p>❌ Erro: ' +
            (e.error ? e.error.message : e.message) + '</p></div>';
    });

    // Estado global
    let registrosPresenca = [];
    let mesCalendario, anoCalendario;
    let dataSelecionada = null;
    let areasDisponiveis = [];
    let turnosDisponiveis = [];
    let escalasDisponiveis = [];
    let areasSelecionadas = new Set();
    let turnosSelecionados = new Set();
    let escalasSelecionadas = new Set();
    let areaCardSelecionada = null;
    let turnoCardSelecionado = null;
    let _detalhesTurnoAtivo = null;
    let _detalhesAreaAtiva  = null;
    let ausenciasDia         = [];
    let prevDataCarregada    = null;
    let escalasDia           = null; // null=não carregado, {rows,schemaCols,schemaDetectado}
    let escalasDataCarregada = null; // data (string) para a qual escalasDia foi carregado
    let _faltaEsperadaPct    = 3.0;  // fallback manual — será substituído pela taxa histórica
    let _taxaAbsHistorico    = null; // { taxa, faltas, total, diasCalculo } — carregado assíncrono
    let _taxaAbsCarregada    = false;
    let _escalaPanelCache    = null; // cache dos dados do painel para recálculo rápido
    let _idgrootTurnoMap     = {};   // idgroot(str) → turno — populado quando escalasDia carrega

    // Justificativas que excluem o colaborador do HC efetivo do dia
    // (não são absenteísmo — são ausências conhecidas e programadas)
    function _ehAusenciaExclusao(justificativa) {
        const j = (justificativa || '').toUpperCase().trim();
        return j.startsWith('DSR')        ||  // Folga de escala
               j.startsWith('AF -')       ||  // INSS, Maternidade, etc.
               j.startsWith('FE -')       ||  // Férias
               j === 'FJ - ATESTADO'      ||  // Atestado médico
               j.includes('INSS')         ||
               j.includes('MATERNIDADE')  ||

    function isPresente(status) {
        if (!status) return false;
        const s = status.toUpperCase().trim();
        return s.startsWith('P') || s.startsWith('HE') || s.includes('PRESENTE');
    }

    // Espelha statusEfetivo() da Chamada:
    // PRESENTE se tem status válido de presença OU se passou na catraca (clock_in)
    // PENDENTE apenas se não tem status E não tem clock_in
    function _isEfetivamentePresente(r) {
        const st = (r.status_presenca || '').trim();
        if (st) return isPresente(st);
        return !!(r.clock_in || '').trim(); // catraca → presente mesmo sem status manual
    }
    function _isPendente(r) {
        const st = (r.status_presenca || '').trim();
        if (st) return false; // qualquer status gravado → não é pendente
        return !(r.clock_in || '').trim(); // só pendente se não tem clock_in (catraca)
    }

    function normalizarArea(nome) {
        if (!nome) return 'SEM ÁREA';
        const upper = nome.toUpperCase().trim();
        const s = upper.normalize('NFD').replace(/[̀-ͯ]/g, ''); // remove acentos
        if (s === 'INVENTARIO' || s === 'QUALIDADE') return 'ICQA';
        if (s === 'RETIROS'    || s === 'RETURNS')   return 'REVERSA';
        if (s === 'TRANSFER MWH' || s === 'TRANSFER')return 'INBOUND';
        if (s === 'CIE')                              return '__EXCLUIR__';
        return upper;
    }

    function normalizarSetor(nome) {
        if (!nome) return 'Sem Setor';
        return nome.toLowerCase().replace(/(?:^|\s)\S/g, l => l.toUpperCase());
    }

    const CARGOS_GESTOR_EXCLUIDOS_FLW = new Set([
        'SUPERVISOR','GERENTE','GERENTE SENIOR','GERENTE SR','GERENTE - IT',
        'ANALISTA','ANALISTA SENIOR','ANALISTA SR','ANALISTA SEMI SENIOR',

    // ── carregarDados: Fase 1 (hoje) + Fase 2 (mês completo) ─────────────────
    // Fase 1: getFlowDataDia(hoje) — consulta de 1 dia, ~3–5s, mostra AO VIVO imediatamente.
    // Fase 2: getFlowData(mes, ano) — mês inteiro via Jobs API assíncrona, pode levar 30–90s.
    //         Ao concluir, atualiza registrosPresenca e re-renderiza o calendário.

    let _mesCarregado = null; // controle: evita recarregar o mês se já disponível

    function carregarDados() {
        // Resetar cache de escala ao mudar de mês/ano
        escalasDia           = null;
        escalasDataCarregada = null;
        _mesCarregado        = null;

        const mes   = mesCalendario + 1;
        const ano   = anoCalendario;
        // Data selecionada ou hoje (para a Fase 1 — carrega apenas esse dia rapidamente)
        const diaStr = dataSelecionada || new Date().toISOString().split('T')[0];

        // ── FASE 1: carregar só o dia selecionado/hoje ──────────────────────
        ChaLoader.start(loading, 'Carregando dados de hoje…');
        detalhesContainer.innerHTML = flwSkelHtml();

        google.script.run
            .withSuccessHandler(function(dataDia) {
                // Fase 1 concluída — mostrar dados imediatamente (sem DSR)
                registrosPresenca = (dataDia || []).filter(r =>
                    (r.status_presenca || '').trim() !== 'DSR - Escala'
                );
                ChaLoader.complete();
                loading.innerHTML = '';
                loading.style.display = 'none';
                atualizarAreasDisponiveis();
                renderCalendario();

                // Se o mês completo já está carregado (troca rápida de dia), não recarrega
                if (_mesCarregado === mes + '/' + ano) return;

                // ── FASE 2: carregar mês completo em background ─────────────
                _mostrarIndicadorMes(true);
                google.script.run
                    .withSuccessHandler(function(dataMes) {
                        _mesCarregado = mes + '/' + ano;
                        if (!dataMes || dataMes.length === 0) {
                            _mostrarIndicadorMes(false);
                            return;
                        }
                        // Mesclar: manter dados do dia atual já carregados, adicionar o restante
                        // Fase 2 também filtra DSR
                        const mesSemDSR = (dataMes || []).filter(r =>
                            (r.status_presenca || '').trim() !== 'DSR - Escala'
                        );
                        const diaJaCarregado = new Set(registrosPresenca.map(r => (r.data_abs || '').split('T')[0]));
                        const extras = mesSemDSR.filter(r => {
                            const d = (r.data_abs || '').split('T')[0];
                            return !diaJaCarregado.has(d);
                        });
                        registrosPresenca = registrosPresenca.concat(extras);
                        atualizarAreasDisponiveis();
                        renderCalendario();
                        _mostrarIndicadorMes(false);
                    })
                    .withFailureHandler(function(err) {
                        console.warn('Fase 2 (mês completo) falhou:', err);
                        _mostrarIndicadorMes(false, true);
                    })
                    .getFlowData(mes, ano);
            })
            .withFailureHandler(function(error) {
                console.error('Erro ao carregar dia:', error);
                ChaLoader.error();
                loading.style.display = 'none';
                detalhesContainer.innerHTML =
                    '<div class="empty-state" style="color:#f87171;">' +
                    '<p>❌ Erro ao carregar dados: ' +
                    (error && error.message ? error.message : error) + '</p>' +
                    '<p style="font-size:12px;color:#999;">Verifique o console do Apps Script.</p></div>';
            })
            .getFlowDataDia(diaStr);
    }

    // Exibe/oculta o indicador "📅 Carregando mês..." no topbar
    function _mostrarIndicadorMes(show, erro) {
        let el = document.getElementById('flwMesLoader');
        if (!el) {
            el = document.createElement('span');

            if (badge) badge.parentNode.insertBefore(el, badge.nextSibling);

        if (!show) { el.style.opacity = '0'; setTimeout(() => { el.textContent = ''; }, 400); return; }
        if (erro) {
            el.style.cssText += 'background:rgba(248,113,113,.1);color:#f87171;';
            el.innerHTML = '⚠ mês parcial';
        } else {
            el.style.cssText += 'background:rgba(99,102,241,.1);color:rgba(139,92,246,.8);';

        }
        el.style.opacity = '1';

    // ── Calendário ────────────────────────────────────────────────────────────

    function renderCalendario() {
        calendarioTitulo.textContent = `${meses[mesCalendario]} ${anoCalendario}`;

        // Remover dias existentes (manter só os cabeçalhos)
        const diasExistentes = calendarioGrid.querySelectorAll('.dia-numero');
        diasExistentes.forEach(d => d.remove());

        const primeiroDia   = new Date(anoCalendario, mesCalendario, 1);
        const ultimoDia     = new Date(anoCalendario, mesCalendario + 1, 0);
        const diasNoMes     = ultimoDia.getDate();
        const diaSemanaInicio = primeiroDia.getDay();

        const hoje    = new Date();
        const hojeStr = hoje.toISOString().split('T')[0];

        // Contar presentes por data
        const presentesPorData = {};
        registrosPresenca.forEach(r => {
            if (!isPresente(r.status_presenca)) return;
            const data = r.data_abs || r.data || r.start_date;
            if (!data) return;
            const ds = typeof data === 'string' ? data.split('T')[0]
                                                : new Date(data).toISOString().split('T')[0];
            presentesPorData[ds] = (presentesPorData[ds] || 0) + 1;
        });

        // Células vazias antes do primeiro dia
        for (let i = 0; i < diaSemanaInicio; i++) {
            const vazio = document.createElement('div');
            vazio.className = 'dia-numero vazio';
            calendarioGrid.appendChild(vazio);
        }

        // Dias do mês
        for (let dia = 1; dia <= diasNoMes; dia++) {
            const ds = `${anoCalendario}-${String(mesCalendario + 1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
            const totalPresentes = presentesPorData[ds] || 0;

            const el = document.createElement('div');
            el.className = 'dia-numero';
            if (ds === hojeStr)       el.classList.add('hoje');
            if (ds === dataSelecionada) el.classList.add('selecionado');
            el.innerHTML = `<span class="numero">${dia}</span>` +
                           (totalPresentes > 0 ? `<span class="badge">${totalPresentes}</span>` : '');

            el.addEventListener('click', () => {
                dataSelecionada     = ds;
                _detalhesTurnoAtivo = null;   // reset drill-down ao trocar de dia
                _detalhesAreaAtiva  = null;
                document.querySelectorAll('.dia-numero').forEach(d => d.classList.remove('selecionado'));
                el.classList.add('selecionado');
                areaCardSelecionada  = null;
                turnoCardSelecionado = null;
                // Renderiza imediatamente com dados disponíveis
                atualizarCardAbsenteismo(ds);
                renderDetalhes(ds);
                // Carrega ausenciasDia em background e re-renderiza quando chegar
                // (garante que KPI chips, Aus. Reais e Aus. Simuladas reflitam as ausências programadas)
                _carregarAusenciasDia(ds);
            });
            calendarioGrid.appendChild(el);
        }

        // Auto-selecionar hoje ou data já selecionada
        if (!dataSelecionada) {
            dataSelecionada = hojeStr;
        }
        renderDetalhes(dataSelecionada);
        // Carrega ausenciasDia em background para o dia inicial
        _carregarAusenciasDia(dataSelecionada);
    }

    // ── Filtros ───────────────────────────────────────────────────────────────

    function atualizarAreasDisponiveis() {
        const areasSet   = new Set();
        const turnosSet  = new Set();
        const escalasSet = new Set();
        registrosPresenca.forEach(r => {
            if (isPresente(r.status_presenca)) {
                if (r.area)  areasSet.add(normalizarArea(r.area));
                if (r.turno) turnosSet.add(r.turno);
                if (r.escala) escalasSet.add(r.escala);
            }
        });
        areasDisponiveis   = Array.from(areasSet).sort();
        turnosDisponiveis  = Array.from(turnosSet).sort();
        escalasDisponiveis = Array.from(escalasSet).sort();

        // Atualizar total de HC único no header
        const totalHC = new Set(registrosPresenca.map(r => r.colaborador).filter(Boolean)).size;
        const heroSubtitle = document.querySelector('.hero-subtitle');
        if (heroSubtitle) heroSubtitle.textContent = `Total de HC: ${fmt(totalHC)}`;

        // Atualizar badge HC no topbar com animação
        const hcBadgeNum = document.getElementById('hcBadgeNum');
        if (hcBadgeNum) {
            let start = 0;
            const duration = 800;
            const step = Math.ceil(totalHC / (duration / 16));
            const counter = setInterval(() => {
                start = Math.min(start + step, totalHC);
                hcBadgeNum.textContent = start.toLocaleString('pt-BR');
                if (start >= totalHC) clearInterval(counter);
            }, 16);
        }

        renderFiltros();
    }

    function renderFiltros() {
        const filtrosContainer = document.getElementById('filtrosContainer');
        if (areasDisponiveis.length === 0 && turnosDisponiveis.length === 0 && escalasDisponiveis.length === 0) {
            filtrosContainer.style.display = 'none';
            return;
        }
        filtrosContainer.style.display = 'flex';

        // Área
        const filtrosAreaList = document.getElementById('filtrosAreaList');
        filtrosAreaList.innerHTML = '';
        areasDisponiveis.forEach(area => {
            const item = document.createElement('div');
            item.className = 'filtro-dropdown-item';
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = `filtro-${area}`;
            cb.checked = areasSelecionadas.has(area);
            cb.addEventListener('change', (e) => {
                if (e.target.checked) areasSelecionadas.add(area);
                else areasSelecionadas.delete(area);
                atualizarBadgeArea();
                if (dataSelecionada) { renderDetalhes(dataSelecionada); atualizarCardAbsenteismo(dataSelecionada); }
            });
            const lbl = document.createElement('label');
            lbl.htmlFor = `filtro-${area}`;
            lbl.textContent = area;
            item.appendChild(cb);
            item.appendChild(lbl);
            filtrosAreaList.appendChild(item);
        });
        atualizarBadgeArea();

        // Turno
        const filtrosTurnoList = document.getElementById('filtrosTurnoList');
        filtrosTurnoList.innerHTML = '';
        turnosDisponiveis.forEach(turno => {
            const item = document.createElement('div');
            item.className = 'filtro-dropdown-item';
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = `filtro-turno-${turno}`;
            cb.checked = turnosSelecionados.has(turno);
            cb.addEventListener('change', (e) => {
                if (e.target.checked) turnosSelecionados.add(turno);
                else turnosSelecionados.delete(turno);
                atualizarBadgeTurno();
                if (dataSelecionada) { renderDetalhes(dataSelecionada); atualizarCardAbsenteismo(dataSelecionada); }
            });
            const lbl = document.createElement('label');
            lbl.htmlFor = `filtro-turno-${turno}`;
            lbl.textContent = turno;
            item.appendChild(cb);
            item.appendChild(lbl);
            filtrosTurnoList.appendChild(item);
        });
        atualizarBadgeTurno();

        // Escala
        const filtrosEscalaList = document.getElementById('filtrosEscalaList');
        filtrosEscalaList.innerHTML = '';
        escalasDisponiveis.forEach(escala => {
            const item = document.createElement('div');
            item.className = 'filtro-dropdown-item';
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = `filtro-escala-${escala}`;
            cb.checked = escalasSelecionadas.has(escala);
            cb.addEventListener('change', (e) => {
                if (e.target.checked) escalasSelecionadas.add(escala);
                else escalasSelecionadas.delete(escala);
                atualizarBadgeEscala();
                if (dataSelecionada) { renderDetalhes(dataSelecionada); atualizarCardAbsenteismo(dataSelecionada); }
            });
            const lbl = document.createElement('label');
            lbl.htmlFor = `filtro-escala-${escala}`;
            lbl.textContent = escala;
            item.appendChild(cb);
            item.appendChild(lbl);
            filtrosEscalaList.appendChild(item);
        });
        atualizarBadgeEscala();
    }
