    /* Reset e Base */
    html, body {
        width: 100% !important;
        height: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow-x: hidden;
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    :root {
        --primary-color: #ffffff;
        --secondary-color: #e2e8f0;
        --text-color: #e2e8f0;
        --bg-color: #030713;
        --card-bg: #0d1526;
        --shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
        --shadow-hover: 0 4px 20px rgba(0, 0, 0, 0.6);
        --border-radius: 18px;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: var(--bg-color) !important;
        color: var(--text-color) !important;
        line-height: 1.6;
        animation: pageTransition 0.4s ease-out;
        position: relative;
        min-height: 100vh;
        width: 100%;
    }

        background-size: 100% 100%;
        background-repeat: no-repeat;
        opacity: 1;
    }
    
    .video-background::before {
        top: -50%;
        left: -50%;
        animation: waveMove1 20s ease-in-out infinite;
    }
    
    .video-background::after {
        top: -50%;
        right: -50%;
        animation: waveMove2 25s ease-in-out infinite;
        animation-delay: -5s;
    }
    
    @keyframes gradientShift {
        0%, 100% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
    }
    
    @keyframes waveMove1 {
        0%, 100% {
            transform: translate(0, 0) rotate(0deg);
        }
        33% {
            transform: translate(5%, 3%) rotate(1deg);
        }
        66% {
            transform: translate(-3%, 5%) rotate(-1deg);
        }
    }
    
    @keyframes waveMove2 {
        0%, 100% {
            transform: translate(0, 0) rotate(0deg);
        }
        33% {
            transform: translate(-5%, -3%) rotate(-1deg);
        }
        66% {
            transform: translate(3%, -5%) rotate(1deg);
        }
    }
    
    /* Overlay transparente */
    .video-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        z-index: -1;
        pointer-events: none;
    }
    
    /* Texto fixo ID/EA */
    .site-identifier {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: #FFD700;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        z-index: 100;
        pointer-events: none;
        backdrop-filter: blur(10px);
    }
    
    
    @keyframes pageTransition {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    /* Animações de Slide */
    @keyframes slideOutLeft {
        from {
            transform: translateX(0);
            opacity: 1;
        }
        to {
            transform: translateX(-100%);
            opacity: 0;
        }
    }
    
    @keyframes slideInRight {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    @keyframes slideOutRight {
        from {
            transform: translateX(0);
            opacity: 1;
        }
        to {
            transform: translateX(100%);
            opacity: 0;
        }
    }
    
    @keyframes slideInLeft {
        from {
            transform: translateX(-100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        width: 100%;
    }
    
    .main-content {
        width: 100%;
        min-height: calc(100vh - 200px);
    }
    
    .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
        margin-bottom: 50px;
        max-width: 100%;
    }
    
    @media (min-width: 1000px) {
        .menu-grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }
    
    /* Header */
    .header {
        background-color: #FFD700;
        backdrop-filter: blur(20px);
        position: sticky;
        top: 0;
        z-index: 1000;
        padding: 15px 0;
        box-shadow: var(--shadow);
    }
    
    .header .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        position: relative;
    }
    
    .header-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 40px;
        width: auto;
        z-index: 1;
        object-fit: contain;
        /* Remover fundo amarelo e deixar logo preto */
        filter: brightness(0) contrast(1.2);
        /* Tentar remover fundo usando blend mode */
        mix-blend-mode: multiply;
        background: transparent;
    }
    
    .logo {
        font-size: 24px;
        font-weight: 600;
        color: var(--secondary-color);
    }
    
    .nav {
        display: flex;
        gap: 20px;
    }
    
    .nav-link {
        background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
        border: none;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 8px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(255, 255, 255, 0.3);
    }
    
    .nav-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(255, 255, 255, 0.5);
    }
    
    /* Hero Section */
    .hero {
        background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
        color: white;
        padding: 80px 20px;
        text-align: center;
        margin-bottom: 50px;
    }
    
    .hero-title {
        font-size: 48px;
        font-weight: 700;
        margin-bottom: 15px;
        animation: fadeInUp 0.8s ease-out;
    }
    
    .hero-subtitle {
        font-size: 20px;
        opacity: 0.9;
        animation: fadeInUp 1s ease-out;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    /* Search Section */
    .search-section {
        display: flex;
        gap: 15px;
        margin-bottom: 30px;
        flex-wrap: wrap;
    }
    
    .search-input,
    .filter-select {
        padding: 15px 20px;
        border: 1px solid #d2d2d7;
        border-radius: 12px;
        font-size: 16px;
        background-color: var(--card-bg);
        transition: all 0.3s;
    }
    
    .search-input {
        flex: 1;
        min-width: 250px;
    }
    
    .search-input:focus,
    .filter-select:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
    }
    
    /* Loading no Header */
    .header-loading {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        background: rgba(26, 26, 26, 0.9);
        border-radius: 16px;
        animation: fadeIn 0.3s ease-out;
        flex-shrink: 0;
        position: absolute;
        left: 60px;
    }
    
    .header-loading .loading-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 215, 0, 0.3);
        border-top: 2px solid #FFD700;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    
    .header-loading .loading-text {
        font-size: 12px;
        font-weight: 500;
        color: #FFD700;
    }
    
    /* Loading Overlay (tela cheia com logo animada) */
    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(15px);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease-out;
    }
    
    .loading-content {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }
    
    .loading-logo {
        animation: logoPulse 2s ease-in-out infinite;
    }
    
    .loading-logo svg circle {
        fill: none;
        stroke: url(#loadingGradient);
    }
    
    .loading-logo svg text {
        fill: url(#loadingGradient);
    }
    
    @keyframes logoPulse {
        0%, 100% {
            transform: scale(1);
            opacity: 1;
        }
        50% {
            transform: scale(1.1);
            opacity: 0.8;
        }
    }
    
    .loading-message {
        font-size: 16px;
        font-weight: 600;
        color: #1a1a1a;
        margin: 0;
        letter-spacing: 0.5px;
    }
    
    .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(26, 26, 26, 0.2);
        border-top: 4px solid #1a1a1a;
        border-right: 4px solid #1a1a1a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    
    .loading-text {
        font-size: 13px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 0.5px;
    }
    
    /* Função global para mostrar/esconder loading */
    .show-loading {
        display: flex !important;
    }
    
    .hide-loading {
        display: none !important;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    /* Loading antigo (mantido para compatibilidade) */
    .loading {
        text-align: center;
        padding: 50px;
    }
    
    .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
    }
    
    /* Menu Grid */
    .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
        margin-bottom: 50px;
    }
    
    .menu-card {
        background-color: var(--card-bg);
        border-radius: var(--border-radius);
        padding: 40px;
        text-align: center;
        box-shadow: var(--shadow);
        transition: all 0.4s ease;
        text-decoration: none;
        color: inherit;
        animation: fadeIn 0.6s ease-out;
    }
    
    .menu-card:hover {
        transform: translateY(-10px);
        box-shadow: var(--shadow-hover);
    }
    
    .menu-icon {
        width: 100px;
        height: 100px;
        margin: 0 auto 25px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: all 0.4s ease;
    }
    
    .menu-card:hover .menu-icon {
        transform: scale(1.1) rotate(5deg);
    }
    
    /* Ícone Chamada (Check) */
    .icon-chamada {
        background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
        animation: chamadaPulse 2s ease-in-out infinite;
    }
    
    @keyframes chamadaPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
        50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
    }
    
    .icon-check {
        width: 35px;
        height: 60px;
        border-right: 6px solid white;
        border-bottom: 6px solid white;
        transform: rotate(45deg) translateY(-5px);
        animation: checkBounce 1.5s ease-in-out infinite;
    }
    
    @keyframes checkBounce {
        0%, 100% { transform: rotate(45deg) translateY(-5px) scale(1); }
        25% { transform: rotate(45deg) translateY(-10px) scale(1.1); }
        75% { transform: rotate(45deg) translateY(0px) scale(0.95); }
    }
    
    /* Ícone Alterações (Edit) */
    .icon-alteracoes {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .icon-edit {
        width: 0;
        height: 0;
        border-left: 25px solid transparent;
        border-right: 25px solid transparent;
        border-bottom: 50px solid white;
        transform: rotate(45deg);
        animation: editSpin 3s linear infinite;
    }
    
    @keyframes editSpin {
        0%, 100% { transform: rotate(45deg); }
        50% { transform: rotate(225deg); }
    }
    
    /* Ícone Tratativa (Settings/Gear) */
    .icon-tratativa {
        background: linear-gradient(135deg, #e8797f 0%, #e0b8a8 100%);
    }
    
    .icon-settings {
        width: 50px;
        height: 50px;
        border: 5px solid white;
        border-radius: 50%;
        position: relative;
        animation: settingsRotate 3s linear infinite;
    }
    
    .icon-settings::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
        background-color: white;
        border-radius: 50%;
    }
    
    .icon-settings::after {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 8px;
        height: 8px;
        background-color: white;
        border-radius: 50%;
        box-shadow: 
            0 42px 0 0 white,
            15px 10px 0 0 white,
            -15px 10px 0 0 white,
            15px 32px 0 0 white,
            -15px 32px 0 0 white;
    }
    
    @keyframes settingsRotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    /* Ícone Ausências (Calendar) */
    .icon-ausencias {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }
    
    .icon-calendar {
        width: 50px;
        height: 50px;
        border: 5px solid white;
        border-radius: 8px;
        position: relative;
        animation: calendarBounce 2s ease-in-out infinite;
    }
    
    .icon-calendar::before {
        content: '';
        position: absolute;
        top: 15px;
        left: 8px;
        width: 8px;
        height: 8px;
        background-color: white;
        border-radius: 50%;
    }
    
    .icon-calendar::after {
        content: '';
        position: absolute;
        top: 15px;
        right: 8px;
        width: 8px;
        height: 8px;
        background-color: white;
        border-radius: 50%;
    }
    
    @keyframes calendarBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    
    /* Ícone Flow (Users) */
    .icon-flow {
        background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        animation: flowWave 3s ease-in-out infinite;
    }
    
    @keyframes flowWave {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 154, 158, 0.3); }
        33% { transform: scale(1.08); box-shadow: 0 0 0 10px rgba(255, 154, 158, 0); }
        66% { transform: scale(0.95); }
    }
    
    .icon-users {
        width: 35px;
        height: 35px;
        background-color: white;
        border-radius: 50%;
        position: relative;
        animation: usersJump 2s ease-in-out infinite;
    }
    
    .icon-users::before {
        content: '';
        position: absolute;
        width: 25px;
        height: 25px;
        background-color: white;
        border-radius: 50%;
        top: -5px;
        left: -30px;
        opacity: 0.7;
        animation: userLeft 2s ease-in-out infinite;
    }
    
    .icon-users::after {
        content: '';
        position: absolute;
        width: 25px;
        height: 25px;
        background-color: white;
        border-radius: 50%;
        top: -5px;
        right: -30px;
        opacity: 0.7;
        animation: userRight 2s ease-in-out infinite;
    }
    
    @keyframes usersJump {
        0%, 100% { transform: scale(1) translateY(0); }
        50% { transform: scale(1.2) translateY(-5px); }
    }
    
    @keyframes userLeft {
        0%, 100% { transform: translateX(0); opacity: 0.7; }
        50% { transform: translateX(-5px); opacity: 1; }
    }
    
    @keyframes userRight {
        0%, 100% { transform: translateX(0); opacity: 0.7; }
        50% { transform: translateX(5px); opacity: 1; }
    }

    
    /* Ícone Dashboard (Chart) */
    .icon-dashboard {
        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }
    
    .icon-chart {
        width: 50px;
        height: 40px;
        position: relative;
    }
    
    .icon-chart::before {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 10px;
        height: 20px;
        background-color: white;
        border-radius: 2px;
        animation: bar1 1.5s ease-in-out infinite;
    }
    
    .icon-chart::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 20px;
        width: 10px;
        height: 35px;
        background-color: white;
        border-radius: 2px;
        animation: bar2 1.5s ease-in-out infinite;
    }
    
    @keyframes bar1 {
        0%, 100% { height: 20px; }
        50% { height: 30px; }
    }
    
    @keyframes bar2 {
        0%, 100% { height: 35px; }
        50% { height: 25px; }
    }
    
    /* Ícone Histórico (History) */
    .icon-historico {
        background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
    }
    
    .icon-history {
        width: 50px;
        height: 50px;
        border: 5px solid white;
        border-radius: 50%;
        position: relative;
        animation: clockRotate 4s linear infinite;
    }
    
    .icon-history::before {
        content: '';
        position: absolute;
        top: 2px;
        left: 50%;
        transform: translateX(-50%);
        width: 3px;
        height: 15px;
        background-color: white;
        border-radius: 2px;
        transform-origin: bottom center;
    }
    
    .icon-history::after {
        content: '';
        position: absolute;
        top: 10px;
        left: 50%;
        width: 3px;
        height: 10px;
        background-color: white;
        border-radius: 2px;
        transform-origin: top left;
    }
    
    @keyframes clockRotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    /* Ícone Available Time (Clock) */
    .icon-available-time {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        animation: timePulse 2.5s ease-in-out infinite;
    }
    
    @keyframes timePulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(240, 147, 251, 0.4); }
        50% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(240, 147, 251, 0); }
    }
    
    .icon-clock {
        width: 50px;
        height: 50px;
        border: 5px solid white;
        border-radius: 50%;
        position: relative;
        animation: clockTick 2s ease-in-out infinite;
    }
    
    .icon-clock::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 3px;
        height: 15px;
        background-color: white;
        border-radius: 2px;
        transform-origin: bottom center;
        animation: hourHand 8s linear infinite;
    }
    
    .icon-clock::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 2px;
        height: 20px;
        background-color: white;
        border-radius: 2px;
        transform-origin: bottom center;
        animation: minuteHand 2s linear infinite;
    }
    
    @keyframes clockTick {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }
    
    @keyframes hourHand {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    @keyframes minuteHand {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    .menu-title {

    .btn-validar {

    }
    
    .btn-validar:hover {

        box-shadow: 0 4px 12px rgba(255, 255, 255, 0.4);
    }
    
    .btn-cancelar {
        background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        color: white;
    }
    
    .btn-cancelar:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
    }
    
    .status-concluído {
        background-color: #d4edda;
        color: #155724;
    }
    
    .status-aprovado {
        background-color: #d4edda;
        color: #155724;
    }
    
    .status-rejeitado {
        background-color: #f8d7da;
        color: #721c24;
    }
    
    .status-cancelado {
        background-color: #f8d7da;
        color: #721c24;
    }

    /* Campo de Busca de Colaborador */
    .search-container {
        position: relative;
        width: 100%;
    }
    
    .search-input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s ease;
    }
    
    .search-input:focus {
        outline: none;
        border-color: #FFD700;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
    }
    
    .search-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: white;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        margin-top: 4px;
        max-height: 300px;
        overflow-y: auto;

        padding: 12px 16px;
        cursor: pointer;
        transition: all 0.2s ease;
        border-bottom: 1px solid #f0f0f0;
    }

    }
    
    .search-dropdown-item:hover {
        background-color: #FFD700;
        color: #1a1a1a;
    }

        text-align: center;
        font-style: italic;
    }
    
    .search-dropdown-item.no-results:hover {

    .badge-falta {

    .badge-ferias {

    .badge-banco {

    .layout-colunas {

        color: var(--secondary-color);

    }

        margin-bottom: 12px;
        animation: fadeIn 0.4s ease-out;
    }

        background-color: var(--card-bg);
        border-radius: 12px;
        padding: 18px 20px;

        align-items: center;

    .area-gestores-dropdown {
        max-height: 0;

        display: flex;
        flex-direction: column;
    }

        max-height: 500px;

        display: flex;
        justify-content: space-between;

        border-left: 3px solid transparent;
        gap: 12px;
    }

        background-position: center;

    }
    
    .area-gestor-item .gestor-name {

        white-space: nowrap;
        overflow: hidden;

    .area-gestor-item .gestor-badge {
        background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
        color: white;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        min-width: 25px;
        text-align: center;
    }
    
    .area-side-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--secondary-color);
    }
    
    .area-side-badge {
        background: linear-gradient(135deg, #a8e6cf 0%, #88d8b0 100%);

        display: flex;

        gap: 12px;
    }

        display: flex;

    }
    
    .accordion-item {
        background-color: #f8f8f8;
        border-radius: 10px;
        overflow: hidden;
        animation: fadeIn 0.3s ease-out;

        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;

        transition: all 0.2s ease;

        font-weight: 600;
        color: var(--secondary-color);

    .accordion-badge {
        background-color: #e0e0e0;
        color: var(--secondary-color);
        padding: 6px 14px;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 700;
        min-width: 35px;
        text-align: center;
    }
    
    .accordion-content {

        transition: max-height 0.3s ease;

    .status-he {

    .action-btn-mini {

    .action-btn-mini .btn-icon {

    .action-btn-mini.btn-presente:hover {

        box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
    }
    
    .action-btn-mini.btn-presente-he {
        background-color: #fff3cd;
        color: #856404;
    }
    
    .action-btn-mini.btn-presente-he:hover {
        background-color: #ffd54f;
        box-shadow: 0 4px 12px rgba(255, 160, 0, 0.3);
    }
    
    .action-btn-mini.btn-folga {
        background-color: #b3e5fc;

    }
    
    .action-btn-mini.btn-folga:hover {
        background-color: #81d4fa;
        box-shadow: 0 4px 12px rgba(3, 169, 244, 0.3);
    }
    
    .action-btn-mini.btn-falta {

    .action-btn-mini.btn-falta:hover {

    .action-btn-mini.btn-ferias {
        background-color: #d1c4e9;
        color: #512da8;
    }
    
    .action-btn-mini.btn-ferias:hover {

        box-shadow: 0 4px 12px rgba(103, 58, 183, 0.3);
    }
    
    .action-btn-mini.btn-falta-atestado {

        color: #ff6f00;
    }
    
    .action-btn-mini.btn-falta-atestado:hover {
        background-color: #ffe082;
        box-shadow: 0 4px 12px rgba(255, 111, 0, 0.3);
    }
    
    .action-btn-mini.btn-folga-bh {

        color: #558b2f;
    }

        background-color: #c5e1a5;
        box-shadow: 0 4px 12px rgba(85, 139, 47, 0.3);

    .action-btn-mini.btn-falta-abandono {

        color: #bf360c;

        box-shadow: 0 4px 12px rgba(191, 54, 12, 0.3);
    }
    
    .action-btn-mini.btn-outros {

        box-shadow: 0 4px 12px rgba(97, 97, 97, 0.3);
    }
    
    .dropdown-outros {
        position: fixed;
        z-index: 9999;
        min-width: 280px;
        max-height: 400px;
        overflow-y: auto;
        background: white;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        opacity: 0;
        visibility: hidden;
        transform: translateY(10px);
        transition: all 0.3s ease;
    }
    
    .dropdown-outros.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }
    
    .dropdown-item {
        padding: 12px 16px;
        font-size: 13px;
        font-weight: 500;
        color: #333;
        cursor: pointer;
        transition: all 0.2s ease;
        border-bottom: 1px solid #f5f5f5;
    }
    
    .dropdown-item:last-child {
        border-bottom: none;
    }
    
    .dropdown-item:hover {
        background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
        color: white;
    }
    
    .dropdown-container {
        position: relative;
        display: inline-block;
        z-index: 1000;
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
        .layout-colunas {
            flex-direction: column;
        }
        
        .coluna-esquerda {
            flex: 1;
            width: 100%;
        }
        
        .action-buttons-inline {
            flex-wrap: wrap;
        }
    }
    
    @media (max-width: 768px) {
        .colab-item-edit {
            flex-direction: column;
            align-items: flex-start;
        }
        
        .action-buttons-inline {
            width: 100%;
            justify-content: space-between;
        }
    }
    
    /* Modal */
    .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        animation: fadeIn 0.3s;
    }
    
    .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .modal-content {
        background-color: var(--card-bg);
        border-radius: var(--border-radius);
        padding: 0;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        animation: slideUp 0.3s ease-out;
    }
    
    @keyframes slideUp {
        from {
            transform: translateY(50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
    
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px;
        border-bottom: 1px solid #f0f0f0;
    }
    
    .modal-header h2 {
        font-size: 24px;
        color: var(--secondary-color);
    }
    
    .close-btn {
        background: none;
        border: none;
        font-size: 32px;
        color: #86868b;
        cursor: pointer;
        transition: color 0.3s;
    }
    
    .close-btn:hover {
        color: var(--secondary-color);
    }
    
    .modal-body {
        padding: 25px;
    }
    
    .admin-actions {
        display: flex;
        flex-direction: column;
        gap: 15px;

    <script>
    function mostrarToast(mensagem, tipo) {
        if (typeof tipo === 'undefined') tipo = 'success';
        
        var toastAntigo = document.querySelector('.toast-notification');
        if (toastAntigo) toastAntigo.remove();
    
        var toast = document.createElement('div');
        toast.className = 'toast-notification toast-' + tipo;
        toast.textContent = mensagem;
        document.body.appendChild(toast);
        
        var duration = tipo === 'info' ? 5000 : 3000;
        setTimeout(function() {
            toast.style.animation = 'slideOutLeft 0.3s ease';
            setTimeout(function() { toast.remove(); }, 300);
        }, duration);
    }
    </script>

    html.light-theme .cha-bl-scan      { background:rgba(0,0,0,.05); }
    html.light-theme .cha-bl-scan::after{ background:linear-gradient(90deg,transparent,#d97706,transparent); box-shadow:0 0 8px rgba(217,119,6,.6); }
    html.light-theme .cha-bl-sub,
    html.light-theme .cha-bl-msg       { color:rgba(100,116,139,.45); }
    </style>

<script>
/* ══════════════════════════════════════════════════════════
   GLOBAL: ChaProgress + ChaLoader
   Incluído via style.html em todas as páginas
══════════════════════════════════════════════════════════ */
const ChaProgress = (function() {
  let _iv = null, _cur = 0;
  function _bar() { return document.getElementById('chaTopBar'); }
  function _ensure() {
    if (document.getElementById('chaTopProgress')) return;
    const el = document.createElement('div');
    el.id = 'chaTopProgress';
    el.innerHTML = '<div id="chaTopBar"></div>';
    document.body.prepend(el);
  }
  return {
    start() {
      _ensure();
      const b = _bar(); if (!b) return;
      b.style.transition = 'none'; b.style.opacity = '1'; b.style.width = '0%';
      _cur = 0; clearInterval(_iv);
      _iv = setInterval(() => {
        _cur += (82 - _cur) * 0.12;
        if (_cur > 81) { clearInterval(_iv); return; }
        b.style.transition = 'width 0.15s ease'; b.style.width = _cur + '%';
      }, 100);
    },
    complete() {
      clearInterval(_iv);
      const b = _bar(); if (!b) return;
      b.style.transition = 'width 0.15s ease, opacity 0.35s ease 0.15s';
      b.style.width = '100%'; b.style.opacity = '0';
      setTimeout(() => { const e = document.getElementById('chaTopProgress'); if (e) e.remove(); }, 550);
    },
    error() {
      clearInterval(_iv);
      const b = _bar(); if (!b) return;
      b.style.transition = 'width 0.2s ease, opacity 0.6s ease 0.8s';
      b.style.background = '#ef4444'; b.style.boxShadow = '0 0 10px rgba(239,68,68,.7)';
      b.style.width = '100%'; b.style.opacity = '0';
    }
  };
})();

const ChaLoader = (function() {
  let _timer = null;
  function _html(msg) {
    return `<div class="cha-brand-loader">
      <div class="cha-bl-row">
        <div class="cha-bl-ring"><svg viewBox="0 0 36 36">
          <circle class="cha-bl-ring-track" cx="18" cy="18" r="14"/>
          <circle class="cha-bl-ring-arc" cx="18" cy="18" r="14" transform="rotate(-90 18 18)"/>
        </svg></div>
        <div class="cha-bl-title">CHECKPOINT</div>
        <div class="cha-bl-divider"></div>
        <div class="cha-bl-sub">Sistema de<br>Absenteísmo</div>
      </div>
      <div class="cha-bl-scan"></div>
      <div class="cha-bl-dots">
        <div class="cha-bl-dot"></div><div class="cha-bl-dot"></div><div class="cha-bl-dot"></div>
      </div>
      <div class="cha-bl-msg">${msg || 'Carregando...'}</div>
    </div>`;
  }
  return {
    start(elOrId, msg, delay) {
      delay = (delay === undefined) ? 150 : delay;
      ChaProgress.start();
      clearTimeout(_timer);
      _timer = setTimeout(() => {
        const el = typeof elOrId === 'string' ? document.getElementById(elOrId) : elOrId;
        if (el) el.innerHTML = _html(msg || 'Carregando...');
      }, delay);
    },
    complete() {
      clearTimeout(_timer);
      ChaProgress.complete();
    },
    error() {
      clearTimeout(_timer);
      ChaProgress.error();
    },
    html(msg) { return _html(msg); }
  };
})();
</script>
